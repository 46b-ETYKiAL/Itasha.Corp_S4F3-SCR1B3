<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640" role="img" aria-label="SCR1B3 — a fast, telemetry-free code and text editor · present day, present text">
  <defs>
    <pattern id="scan" patternUnits="userSpaceOnUse" width="1280" height="4">
      <rect width="1280" height="2" fill="transparent"/><rect y="2" width="1280" height="2" fill="rgba(0,0,0,0.16)"/>
    </pattern>
    <radialGradient id="vig" cx="50%" cy="48%" r="72%">
      <stop offset="0%" stop-color="transparent"/><stop offset="100%" stop-color="rgba(0,0,0,0.5)"/>
    </radialGradient>
    <linearGradient id="grid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFC04A" stop-opacity="0"/><stop offset="100%" stop-color="#FFC04A" stop-opacity="0.5"/>
    </linearGradient>
    <filter id="phos"><feGaussianBlur in="SourceGraphic" stdDeviation="0.7" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="soft"><feGaussianBlur stdDeviation="2.4"/></filter>
    <filter id="glow"><feGaussianBlur stdDeviation="2.6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <clipPath id="sc"><rect x="28" y="22" width="1224" height="592" rx="6"/></clipPath>
    <radialGradient id="glass" cx="36%" cy="22%" r="62%"><stop offset="0%" stop-color="#ffffff" stop-opacity="0.06"/><stop offset="55%" stop-color="#ffffff" stop-opacity="0"/></radialGradient>
    <pattern id="phosmask" width="3" height="1" patternUnits="userSpaceOnUse"><rect width="1" height="1" x="0" fill="#ff2a2a"/><rect width="1" height="1" x="1" fill="#2aff2a"/><rect width="1" height="1" x="2" fill="#2a2aff"/></pattern>
  </defs>
  <style>
    text { font-family: 'SF Mono','Fira Code','Cascadia Code','JetBrains Mono',Consolas,monospace; }
    @keyframes sweep { 0% { transform: translateY(0); } 100% { transform: translateY(592px); } }
    @keyframes flicker { 0%,96%,100% { opacity: 1; } 97% { opacity: 0.97; } 98% { opacity: 0.995; } }
    @keyframes bootReveal { 0% { opacity: 0; } 100% { opacity: 0.92; } }
    @keyframes curBlink { 0%,50% { opacity: 1; } 51%,100% { opacity: 0; } }
    @keyframes heartbeat { 0%,100% { transform: scale(1); opacity: 0.55; } 15% { transform: scale(1.3); opacity: 0.95; } 30% { transform: scale(1); opacity: 0.55; } 50% { transform: scale(1.1); opacity: 0.8; } }
    @keyframes edgeGlow { 0% { stroke-dashoffset: 3450; } 100% { stroke-dashoffset: 0; } }
    @keyframes phosphorBloom { 0%,100% { opacity: 0; } 50% { opacity: 0.02; } }
    @keyframes signalPulse { 0% { stroke-dashoffset: 18; opacity: 0.85; } 100% { stroke-dashoffset: 0; opacity: 0.3; } }
    @keyframes nodeBlink { 0%,100% { opacity: 0.9; } 50% { opacity: 0.35; } }
    @keyframes kanjiPulse { 0%,100% { opacity: 0.1; } 50% { opacity: 0.2; } }
    @keyframes rollBar { 0% { transform: translateY(-70px); } 100% { transform: translateY(631px); } }
    @keyframes dataBlink { 0%,100% { opacity: 0.12; } 50% { opacity: 0.7; } }
    @keyframes titleGlitch { 0%,90%,100% { transform: translate(0,0); } 91% { transform: translate(-2px,1px); } 94% { transform: translate(2px,-1px); } 97% { transform: translate(-1px,0); } }
    @keyframes okPulse { 0%,100% { opacity: 0.5; } 50% { opacity: 1; } }
    @keyframes linePulse { 0%,100% { opacity: 0.8; } 50% { opacity: 1; } }
    @keyframes titleBreathe { 0%,100% { opacity: 1; } 50% { opacity: 0.85; } }
    @keyframes crtBlank { 0%,90% { opacity: 0; } 91.5% { opacity: 1; } 97% { opacity: 1; } 98.6% { opacity: 0; } 100% { opacity: 0; } }
    @keyframes crtLine { 0%,89.5% { opacity: 0; transform: scaleY(1); } 90.4% { opacity: 0.95; transform: scaleY(0.03); } 91.4% { opacity: 0; transform: scaleY(0.01); } 97.4% { opacity: 0; transform: scaleY(0.02); } 98.2% { opacity: 0.95; transform: scaleY(0.08); } 99.2% { opacity: 0; transform: scaleY(1); } 100% { opacity: 0; } }
    @keyframes tokShimmer { 0%,100% { opacity: 0.55; } 50% { opacity: 1; } }
    @keyframes typeCur { 0%,49% { opacity: 1; } 50%,100% { opacity: 0; } }
    @keyframes lineGrow { 0% { transform: scaleX(0); } 70%,100% { transform: scaleX(1); } }
    @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
  </style>

  <rect x="0" y="0" width="1280" height="640" rx="14" fill="#0b0f12"/>
  <rect x="2" y="2" width="1276" height="636" rx="13" fill="#1a242b" stroke="#2a3a42" stroke-width="1"/>
  <line x1="24" y1="13" x2="1256" y2="13" stroke="#2a3a42" stroke-width="0.5"/>
  <line x1="24" y1="620" x2="1256" y2="620" stroke="#2a3a42" stroke-width="0.5"/>
  <rect x="28" y="22" width="1224" height="592" rx="6" fill="#070a0c"/>

  <g clip-path="url(#sc)">
    <g stroke="url(#grid)" stroke-width="0.6" opacity="0.5">
      <line x1="640" y1="442" x2="40" y2="605"/><line x1="640" y1="442" x2="220" y2="605"/>
      <line x1="640" y1="442" x2="400" y2="605"/><line x1="640" y1="442" x2="540" y2="605"/>
      <line x1="640" y1="442" x2="640" y2="605"/><line x1="640" y1="442" x2="740" y2="605"/>
      <line x1="640" y1="442" x2="900" y2="605"/><line x1="640" y1="442" x2="1060" y2="605"/>
      <line x1="640" y1="442" x2="1240" y2="605"/>
    </g>
    <g stroke="#FFC04A" stroke-width="0.5" opacity="0.2">
      <line x1="120" y1="521" x2="1160" y2="521"/><line x1="80" y1="567" x2="1200" y2="567"/><line x1="48" y1="605" x2="1232" y2="605"/>
    </g>
    <g fill="#FFC04A">
      <circle cx="360" cy="561" r="1.6" style="animation: dataBlink 2.6s ease-in-out 0s infinite;"/>
      <circle cx="700" cy="597" r="1.6" style="animation: dataBlink 3.1s ease-in-out 0.8s infinite;"/>
      <circle cx="980" cy="545" r="1.6" style="animation: dataBlink 2.4s ease-in-out 1.4s infinite;"/>
      <circle cx="498" cy="605" r="1.6" fill="#5050ff" style="animation: dataBlink 3.4s ease-in-out 2s infinite;"/>
    </g>
    <rect x="28" y="22" width="1224" height="46" fill="#ffe2ad" opacity="0.035" style="animation: rollBar 7s linear infinite;"/>
    <rect x="28" y="22" width="1224" height="3" fill="#FFC04A" opacity="0.05" style="animation: sweep 9s linear infinite;"/>
    <rect x="28" y="22" width="1224" height="592" fill="#ffffff" opacity="0" style="animation: phosphorBloom 8s ease-in-out infinite;"/>
  </g>
  <rect x="28" y="22" width="1224" height="592" rx="6" fill="url(#scan)"/>
  <rect x="28" y="22" width="1224" height="592" rx="6" fill="url(#vig)"/>
  <rect x="28" y="22" width="1224" height="592" rx="6" fill="url(#phosmask)" opacity="0.04"/>
  <rect x="28" y="22" width="1224" height="592" rx="6" fill="url(#glass)"/>
  <rect x="28" y="22" width="1224" height="592" rx="6" fill="none" stroke="#FFC04A" stroke-width="1" opacity="0.07" stroke-dasharray="22,3428" style="animation: edgeGlow 11s linear infinite;"/>
  <rect x="28" y="22" width="1224" height="592" rx="6" fill="none" stroke="#1a242b"/>

  <g stroke="#FFC04A" stroke-width="1.4" fill="none" opacity="0.55">
    <path d="M56 54 h26 M56 54 v26"/><path d="M1224 54 h-26 M1224 54 v26"/>
    <path d="M56 582 h26 M56 582 v-26"/><path d="M1224 582 h-26 M1224 582 v-26"/>
  </g>

  <g style="animation: flicker 7s infinite;">
    <text x="640" y="86" text-anchor="middle" font-size="14" fill="#5a6b73" letter-spacing="8" filter="url(#phos)" style="font-family: 'Times New Roman','Times','Matisse',serif; font-weight: 700; transform: scaleX(0.82); transform-origin: 640px 86px; animation: titleBreathe 6s ease-in-out infinite;">I T A S H A . C O R P</text>
    <g font-size="66" font-weight="bold" letter-spacing="7" text-anchor="middle">
      <text x="643" y="160" fill="#8c6cd0" opacity="0.5" filter="url(#soft)" style="animation: titleGlitch 5.5s steps(1) infinite; transform-origin: 640px 160px;">SCR1B3</text>
      <text x="637" y="160" fill="#FFC04A" opacity="0.5" filter="url(#soft)" style="animation: titleGlitch 6.3s steps(1) 0.1s infinite; transform-origin: 640px 160px;">SCR1B3</text>
      <text x="640" y="160" fill="#e9f7ff" filter="url(#glow)" style="animation: titleBreathe 4s ease-in-out infinite;">SCR1B3</text>
    </g>
    <text x="640" y="196" text-anchor="middle" font-size="15" fill="#8c6cd0" letter-spacing="3" filter="url(#phos)">a fast, telemetry-free editor · present day · present text</text>
    <text x="640" y="222" text-anchor="middle" font-size="12" fill="#5a6b73" letter-spacing="4" filter="url(#phos)">rope buffer · syntect · tree-sitter · one live TOML config</text>

    <g filter="url(#phos)">
      <text x="64" y="278" font-size="12" fill="#5a6b73">scr1b3 --open ──────────────────────────────</text>
      <text x="84" y="308" font-size="12.5" fill="#FFC04A" style="animation: bootReveal 0.35s ease-out 0.2s both, linePulse 3.6s ease-in-out 0.0s infinite;">&gt; mmap rope buffer · open files &gt; RAM</text>
      <text x="544" y="308" font-size="12.5" fill="#6fb89a" style="animation: bootReveal 0.35s ease-out 0.2s both, okPulse 2s ease-in-out 0.6s infinite;">[ OK ]</text>
      <text x="84" y="336" font-size="12.5" fill="#FFC04A" style="animation: bootReveal 0.35s ease-out 0.5s both, linePulse 3.6s ease-in-out 0.4s infinite;">&gt; syntect highlight · 100+ langs · no build</text>
      <text x="544" y="336" font-size="12.5" fill="#6fb89a" style="animation: bootReveal 0.35s ease-out 0.5s both, okPulse 2s ease-in-out 1.0s infinite;">[ OK ]</text>
      <text x="84" y="364" font-size="12.5" fill="#FFC04A" style="animation: bootReveal 0.35s ease-out 0.8s both, linePulse 3.6s ease-in-out 0.8s infinite;">&gt; tree-sitter structural awareness</text>
      <text x="544" y="364" font-size="12.5" fill="#6fb89a" style="animation: bootReveal 0.35s ease-out 0.8s both, okPulse 2s ease-in-out 1.4s infinite;">[ OK ]</text>
      <text x="84" y="392" font-size="12.5" fill="#FFC04A" style="animation: bootReveal 0.35s ease-out 1.1s both, linePulse 3.6s ease-in-out 1.2s infinite;">&gt; live-reload appearance.toml · themes</text>
      <text x="544" y="392" font-size="12.5" fill="#6fb89a" style="animation: bootReveal 0.35s ease-out 1.1s both, okPulse 2s ease-in-out 1.8s infinite;">[ OK ]</text>
      <text x="84" y="420" font-size="12.5" fill="#FFC04A" style="animation: bootReveal 0.35s ease-out 1.4s both, linePulse 3.6s ease-in-out 1.6s infinite;">&gt; render gpu glyph atlas · zero telemetry</text>
      <text x="544" y="420" font-size="12.5" fill="#6fb89a" style="animation: bootReveal 0.35s ease-out 1.4s both, okPulse 2s ease-in-out 2.2s infinite;">[ OK ]</text>
      <text x="64" y="448" font-size="12" fill="#5a6b73">────────────────────────────────────────────</text>
      <text x="64" y="482" font-size="13" fill="#6fb89a">user@itasha:scribe$</text>
      <rect x="206" y="470" width="11" height="16" fill="#FFC04A" style="animation: curBlink 1.1s step-end infinite;"/>
      <text x="64" y="514" font-size="11" fill="#5a6b73" letter-spacing="2">present day · present text</text>
    </g>

    <g transform="translate(880, 278)" style="animation: flicker 9s infinite;">
      <text x="70" y="178" fill="#9a7ad0" font-size="50" font-family="'Noto Sans JP','Yu Gothic',sans-serif" style="animation: kanjiPulse 6s ease-in-out infinite;">書記</text>
      <rect x="0" y="6" width="300" height="180" rx="4" fill="none" stroke="#FFC04A" stroke-width="1.1" opacity="0.55" filter="url(#phos)"/>
      <rect x="0" y="6" width="300" height="18" rx="4" fill="#FFC04A" opacity="0.08"/>
      <circle cx="14" cy="15" r="3" fill="#ff3b30" opacity="0.55"/><circle cx="26" cy="15" r="3" fill="#f2b33d" opacity="0.6"/><circle cx="38" cy="15" r="3" fill="#6fb89a" opacity="0.6"/>
      <text x="150" y="18" text-anchor="middle" font-size="7.5" fill="#5a6b73" letter-spacing="1">main.rs — SCR1B3</text>
      <line x1="30" y1="24" x2="30" y2="186" stroke="#FFC04A" stroke-width="0.5" opacity="0.25"/>
      <g filter="url(#phos)"><text x="20" y="34" text-anchor="end" font-size="8" fill="#5a6b73" opacity="0.7">1</text><text x="20" y="50" text-anchor="end" font-size="8" fill="#5a6b73" opacity="0.7">2</text><text x="20" y="66" text-anchor="end" font-size="8" fill="#5a6b73" opacity="0.7">3</text><text x="20" y="82" text-anchor="end" font-size="8" fill="#5a6b73" opacity="0.7">4</text><text x="20" y="98" text-anchor="end" font-size="8" fill="#5a6b73" opacity="0.7">5</text><text x="20" y="114" text-anchor="end" font-size="8" fill="#5a6b73" opacity="0.7">6</text><text x="20" y="130" text-anchor="end" font-size="8" fill="#5a6b73" opacity="0.7">7</text><text x="20" y="146" text-anchor="end" font-size="8" fill="#5a6b73" opacity="0.7">8</text><text x="20" y="162" text-anchor="end" font-size="8" fill="#5a6b73" opacity="0.7">9</text></g>
      <g font-size="9" filter="url(#phos)">
        <text x="40" y="34"><tspan fill="#FFC04A" style="animation: tokShimmer 3s ease-in-out 0s infinite;">fn</tspan> <tspan fill="#5050ff">open</tspan><tspan fill="#5a6b73">(path: &amp;</tspan><tspan fill="#FFC04A">str</tspan><tspan fill="#5a6b73">) {</tspan></text>
        <text x="52" y="50"><tspan fill="#5a6b73">let</tspan> <tspan fill="#e9f7ff">buf</tspan> <tspan fill="#5a6b73">=</tspan> <tspan fill="#5050ff">Rope</tspan><tspan fill="#5a6b73">::mmap(path);</tspan></text>
        <text x="52" y="66" fill="#6fb89a" style="animation: tokShimmer 3s ease-in-out 0.5s infinite;">"present text"</text>
        <text x="52" y="82"><tspan fill="#5a6b73">//</tspan> <tspan fill="#5a6b73" opacity="0.7">syntect · 100+ langs</tspan></text>
        <text x="52" y="98"><tspan fill="#FFC04A" style="animation: tokShimmer 3s ease-in-out 1s infinite;">for</tspan> <tspan fill="#e9f7ff">ln</tspan> <tspan fill="#5a6b73">in</tspan> <tspan fill="#5050ff">buf</tspan><tspan fill="#5a6b73">.lines() {</tspan></text>
        <text x="64" y="114"><tspan fill="#5050ff">render</tspan><tspan fill="#5a6b73">(ln);</tspan></text>
        <text x="52" y="130" fill="#5a6b73">}</text>
        <text x="40" y="146" fill="#5a6b73">}</text>
        <text x="40" y="166"><tspan fill="#FFC04A">~</tspan> <tspan fill="#5a6b73">no webview · no telemetry</tspan></text>
      </g>
      <rect x="98" y="158" width="6" height="11" fill="#FFC04A" style="animation: typeCur 1.05s step-end infinite;"/>
      <rect x="30" y="34" width="270" height="2" fill="#FFC04A" opacity="0.18" transform-origin="30px 35px" style="animation: lineGrow 4s ease-in-out infinite;"/>
    </g>
  </g>

  <g>
    <circle cx="56" cy="627" r="3.5" fill="#6fb89a" opacity="0.7" style="animation: heartbeat 2.4s ease-in-out infinite; transform-origin: 56px 627px;"/>
    <circle cx="71" cy="627" r="3" fill="#FFC04A" opacity="0.45"/>
    <circle cx="86" cy="627" r="3" fill="#5050ff" opacity="0.4"/>
    <text x="108" y="627" font-size="9" fill="#3a4a52" letter-spacing="3.2" dominant-baseline="central">ITASHA.CORP</text>
    <text x="640" y="627" font-size="9" fill="#3a4a52" letter-spacing="3" dominant-baseline="central" text-anchor="middle">SCRIBE</text>
    <text x="1208" y="627" font-size="9" fill="#3a4a52" letter-spacing="2.4" dominant-baseline="central" text-anchor="end">CRT-IC v2</text>
    <circle cx="1224" cy="627" r="4" fill="#6fb89a" opacity="0.5"/>
    <circle cx="1224" cy="627" r="2" fill="#6fb89a" opacity="0.95" style="animation: heartbeat 2.4s ease-in-out infinite; transform-origin: 1224px 627px;"/>
  </g>
  <rect x="28" y="22" width="1224" height="592" rx="6" fill="#050608" opacity="0" style="animation: crtBlank 14s ease-in-out infinite;"/>
  <rect x="28" y="316.5" width="1224" height="3" fill="#e9f7ff" opacity="0" style="animation: crtLine 14s ease-in-out infinite; transform-origin: 640px 318.0px;"/>
