name: Workflow Security

# zizmor — static analysis for GitHub Actions workflow security (template
# injection, excessive permissions, unpinned actions, dangerous triggers,
# self-hosted-runner risks). This is the OSS-published equivalent of the
# monorepo's in-house workflow-security audit. The public repo cannot import
# the internal module, so the public, pip-installable zizmor is the right
# tool here. Results upload to the Security tab as SARIF.
#
# Ported from F0RG3-W1R3's workflow-security.yml per audit M-002 (see
# SECURITY.md "CI/CD Security Posture"). Scheduled on Thursdays to spread
# runner usage across the week (codeql is Tuesday, scorecard is Wednesday).

on:
  push:
    branches: [master]
  pull_request:
  schedule:
    - cron: "47 6 * * 4"   # Thursday 06:47 UTC
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: workflow-security-${{ github.ref }}
  # Cancel only stale PR runs; never cancel master/scheduled runs, so they
  # complete and never leave a cancelled (failed-looking) check-run on the
  # commit (a cancelled SARIF/security scan is also an incomplete analysis).
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  zizmor:
    name: zizmor workflow audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Harden the runner (egress audit)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Install zizmor (hash-pinned)
        # Hash-pinned per OSSF Scorecard Pinned-Dependencies (pipCommand).
        # Pins zizmor==1.25.2 by sha256; see .github/requirements-zizmor.txt.
        run: python -m pip install --require-hashes -r .github/requirements-zizmor.txt

      - name: Run zizmor (SARIF)
        # zizmor v1.x always writes results to stdout — there is no
        # --output flag; SARIF must be captured via shell redirection.
        # With --format sarif zizmor exits 0 even when findings exist
        # (SARIF consumers read results from the document, not the exit
        # code), so the report is uploaded to the Security tab below.
        # https://docs.zizmor.sh/usage/  (Output handling + SARIF section)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: zizmor --format sarif . >zizmor.sarif

      - name: Upload zizmor SARIF
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          sarif_file: zizmor.sarif
          category: zizmor
