name: Scorecard supply-chain security

# OpenSSF Scorecard for SCR1B3. Identical pattern to the F0RG3-W1R3 scorecard
# workflow. Free for public repos. Publishes a public OSSF Scorecard for
# downstream consumers and the OpenSSF Best Practices badge process.
#
# Ported from F0RG3-W1R3's scorecard.yml per audit M-002. Scheduled on
# Wednesdays to spread runner usage across the week.

on:
  branch_protection_rule:
  schedule:
    - cron: "31 9 * * 3"   # Wednesday 09:31 UTC
  push:
    branches: [master]
  workflow_dispatch:

permissions: read-all

concurrency:
  group: scorecard-${{ github.ref }}
  # Cancel only stale PR runs; never cancel master/scheduled runs, so they
  # complete and never leave a cancelled (failed-looking) check-run on the
  # commit (a cancelled SARIF/security scan is also an incomplete analysis).
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      id-token: write
      contents: read
      actions: read
    steps:
      - name: Harden the runner (egress audit)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload SARIF to code scanning
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          sarif_file: results.sarif
