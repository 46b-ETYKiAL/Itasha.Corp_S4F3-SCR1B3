# SCR1B3 supply-chain gate — Phase 21 T21.1 primary safety check. Runs
# `cargo-deny` against the workspace `deny.toml` config (license allowlist +
# advisory deny + sources lockdown). Fails the CI on any new license drift,
# unpatched RUSTSEC advisory, or banned source. The in-app updater and the
# F0RG3-W1R3 installer manifest both trust this gate as the primary
# supply-chain proof.

name: cargo-deny

on:
  push:
    branches: [master]
  pull_request:
  schedule:
    # Nightly so advisories that landed between PRs surface within 24 h.
    - cron: "30 6 * * *"
  workflow_dispatch:

concurrency:
  group: cargo-deny-${{ github.ref }}
  # Cancel only stale PR runs; never cancel master/scheduled runs, so they
  # complete and never leave a cancelled (failed-looking) check-run on the
  # commit (a cancelled SARIF/security scan is also an incomplete analysis).
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  deny:
    name: cargo-deny ${{ matrix.checks }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        checks:
          - advisories
          - bans
          - licenses
          - sources
    steps:
      - name: Harden the runner (egress audit)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe # v2.0.20
        with:
          command: check ${{ matrix.checks }}
          arguments: --workspace --all-features
