name: CI

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:
  schedule:
    # Weekly mutation-testing run (Mondays 06:00 UTC). Only the `mutation` job
    # acts on this trigger (it is `if:`-gated); the other jobs re-running weekly
    # is a harmless freshness check.
    - cron: "0 6 * * 1"

concurrency:
  group: ci-${{ github.ref }}
  # Cancel only stale PR runs; never cancel master/scheduled runs, so they
  # complete and never leave a cancelled (failed-looking) check-run on the
  # commit (a cancelled SARIF/security scan is also an incomplete analysis).
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Least-privilege default for every job: read-only repo access. None of the CI
# jobs (build/test, cargo-deny, content-safety, manifest audit) write to the
# repo, so the GITHUB_TOKEN never needs more than `contents: read`.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: build & test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Harden the runner (egress audit)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          # Pinned for reproducible CI; bump in lockstep with rust-toolchain.toml.
          toolchain: "1.95.0"
          components: rustfmt, clippy
      - name: Linux GUI deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libxcb-render0-dev libxcb-shape0-dev \
            libxcb-xfixes0-dev libxkbcommon-dev libssl-dev
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Format check
        run: cargo fmt --all --check
      - name: Clippy (deny warnings)
        # `--locked` forces clippy to resolve against the committed
        # Cargo.lock so a freshly-published upstream major (e.g.
        # chardetng 1.0 — a breaking-API rev that lands as a
        # Dependabot PR) cannot break CI before we explicitly bump.
        run: cargo clippy --locked --all-targets -- -D warnings
      - name: Build
        run: cargo build --locked --all-targets
      - name: Test
        # --test-threads=1 — the egui-context E2E tests share font/atlas
        # state across Driver instances within a process and race under
        # parallel execution (locally observable: 52/52 pass at low test
        # counts, 3+ fail when the test count crosses a saturation
        # threshold). Until the E2E suite gains per-test process isolation
        # or a serial_test adoption decision lands, serial execution is
        # the deterministic gate. CI runtime cost is bounded by the
        # slowest single test (~3s for the rope-buffer million-line test).
        run: cargo test --locked -- --test-threads=1

  deny:
    name: cargo-deny (licenses + advisories)
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (egress audit)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe # v2.0.20
        with:
          command: check

  content-safety:
    name: public-repo content-safety audit
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (egress audit)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Audit for internal references / secrets
        run: python3 scripts/content_safety_audit.py

  forge-wire-manifest:
    name: F0RG3-W1R3 install-manifest audit (Phase 22 T22.3)
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (egress audit)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Audit forge-wire-manifest.toml
        run: python3 scripts/verify_forge_wire_manifest.py

  fuzz-build:
    # Compile-only check that the cargo-fuzz targets stay buildable (they need
    # nightly + libFuzzer, so they live outside the main workspace). No fuzzing
    # run here — just a guard against the harness rotting. The checked-in
    # `fuzz/` project is what the OpenSSF Scorecard Fuzzing probe detects.
    name: fuzz targets build
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (egress audit)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install nightly Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable action; nightly toolchain
        with:
          toolchain: nightly
      - name: Linux GUI deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libxcb-render0-dev libxcb-shape0-dev \
            libxcb-xfixes0-dev libxkbcommon-dev libssl-dev
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked
      - name: fuzz/Cargo.lock is current
        working-directory: fuzz
        # Every other cargo call in this repo runs `--locked`; `cargo fuzz build`
        # cannot (cargo-fuzz exposes no such flag and rejects it), so it silently
        # REGENERATES fuzz/Cargo.lock in the runner and passes. Lockfile drift
        # was therefore unfailable — and had already happened unnoticed: the
        # committed lock pinned scribe-core 0.4.57 while the workspace was on
        # 0.4.59, i.e. the fuzz targets linked a version we no longer ship.
        #
        # `cargo metadata --locked` re-resolves against the committed lock and
        # exits non-zero if it is stale, which restores the guarantee without the
        # nightly/sanitizer toolchain. Verified BOTH ways: exit 0 against the
        # current lock, exit 101 against a deliberately staled one.
        run: cargo metadata --locked --format-version 1 > /dev/null
      - name: Build fuzz targets (compile-only)
        working-directory: fuzz
        run: cargo +nightly fuzz build

  miri:
    # Per-PR gate: run the scribe-core Miri soundness suite (UB detection over
    # the rope/encoding/segmentation logic + dependency unsafe). The crate's only
    # direct unsafe is the read-only mmap syscall, which is outside Miri's machine
    # model, so the suite exercises the safe abstractions + dependency unsafe over
    # in-memory data (crates/scribe-core/tests/miri_soundness.rs).
    name: miri soundness (scribe-core)
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (egress audit)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install nightly Rust + Miri
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable action; nightly toolchain
        with:
          toolchain: nightly
          components: miri
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Miri test (scribe-core soundness suite)
        run: cargo +nightly miri test -p scribe-core --test miri_soundness

  mutation-in-diff:
    # Mutation testing scoped to the lines THIS PR touched (`--in-diff`), across
    # BOTH crates. The scheduled job below covers scribe-core only and is skipped
    # on PRs, which left a hole big enough to drive a truck through: scribe-app —
    # the crate with the app logic and ~1,000 of the tests — was NEVER mutation
    # tested, on any run, ever. A PR could raise scribe-app's line coverage while
    # adding tests that assert nothing, and every check would stay green.
    #
    # That is not hypothetical. The PR that added this job took
    # text_ops_methods.rs from 33% to 95% line coverage, went 24/24 green, and
    # still carried 6 surviving mutants — including a 500 KB perf guard that read
    # as "covered" (the comparison executes on every test) while no fixture was
    # big enough to tell `>` from `==`.
    #
    # Diff-scoped so it is fast enough to gate every PR: mutants apply to
    # production code only (never `#[cfg(test)]`), so a test-only PR mutates
    # nothing and this passes in seconds. `--in-place` keeps it to one build tree.
    name: mutation testing (in-diff)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (egress audit)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          # cargo-mutants diffs against the merge base, which needs real history.
          fetch-depth: 0
      - name: Install Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: "1.95.0"
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Install cargo-mutants + nextest
        run: cargo install cargo-mutants cargo-nextest --locked
      - name: Diff against the merge base
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: git diff "$BASE_SHA"...HEAD -- '*.rs' > pr.diff
      - name: Mutation test (only what this PR changed)
        # A surviving mutant here means a line this PR touched can be broken with
        # the suite still green. Fix the test, or document the mutant as
        # equivalent (see apply.rs for the precedent) — do not silence the job.
        run: cargo mutants --in-diff pr.diff --test-tool nextest --timeout 300 --in-place

  mutation:
    # Mutation testing (cargo-mutants) over scribe-core — too slow to gate every
    # PR, so it runs weekly (schedule) + on demand (workflow_dispatch). Surviving
    # mutants flag tests that execute a line but do not assert its behaviour.
    # The `mutation-in-diff` job above is the per-PR counterpart.
    name: mutation testing (scribe-core, scheduled)
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (egress audit)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: "1.95.0"
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Install cargo-mutants + nextest
        run: cargo install cargo-mutants cargo-nextest --locked
      - name: Mutation test (scribe-core logic)
        run: cargo mutants -p scribe-core --test-tool nextest --timeout 120

  unused-deps:
    # cargo-machete fails the build on an UNUSED dependency. An unused dep is
    # unaudited code sitting in the lockfile + attack surface for no benefit;
    # keeping the graph minimal is a supply-chain control. Verified clean at
    # the time this job landed.
    name: cargo-machete (unused deps)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Harden the runner (egress audit)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          # Pinned for reproducible CI; bump in lockstep with rust-toolchain.toml.
          toolchain: "1.95.0"
      - name: Install cargo-machete
        run: cargo install cargo-machete --locked
      - name: Check for unused dependencies
        run: cargo machete

  msrv:
    # Enforce the declared MSRV (Cargo.toml `rust-version`). Without this the
    # claim silently rots — CI otherwise only ever builds on the pinned stable
    # (1.95.0), so a dependency that raised the floor would go unnoticed and
    # SECURITY.md's BatBadBut argument would rest on an unverified number.
    # `cargo check` on exactly the declared MSRV fails loudly if the floor moved.
    name: MSRV check (rust-version)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Harden the runner (egress audit)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install Rust (declared MSRV)
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable action; MSRV toolchain
        with:
          # Must equal Cargo.toml `rust-version`. Bump both together when a
          # dependency raises the floor.
          toolchain: "1.92.0"
      - name: Linux GUI deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libxcb-render0-dev libxcb-shape0-dev \
            libxcb-xfixes0-dev libxkbcommon-dev libssl-dev
      - name: cargo check on the declared MSRV
        run: cargo check --workspace --locked

  supply-chain-audit:
    # cargo-vet: human supply-chain review on top of cargo-deny's advisory/license
    # gate. Every dependency is either audited (incl. imported Mozilla/Google/
    # Bytecode-Alliance audits) or exempted in supply-chain/; a NEW or bumped dep
    # that is neither fails here, forcing a review decision before it ships.
    name: cargo-vet (supply chain)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Harden the runner (egress audit)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          # Pinned for reproducible CI; bump in lockstep with rust-toolchain.toml.
          toolchain: "1.95.0"
      - name: Install cargo-vet
        run: cargo install cargo-vet --locked
      - name: Vet dependencies
        run: cargo vet --locked

  binary-hardening:
    # Non-regressing guard for the binary mitigations: build the RELEASE exe
    # (Control Flow Guard is applied via .cargo/config.toml's cfg(windows)
    # rustflags) and assert with winchecksec that the shipped binary actually
    # carries CFG + ASLR (/DYNAMICBASE) + High-Entropy VA + DEP (/NXCOMPAT). If a
    # future change ever drops a mitigation, this fails instead of silently
    # shipping a weaker binary.
    name: binary hardening (winchecksec)
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - name: Harden the runner (egress audit)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          # Pinned for reproducible CI; bump in lockstep with rust-toolchain.toml.
          toolchain: "1.95.0"
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Build release binary (CFG via .cargo/config.toml)
        run: cargo build --release --locked --bin scr1b3
      - name: Download + verify winchecksec
        shell: bash
        run: |
          set -euo pipefail
          # SHA-256-pinned download — never run an unverified binary in CI.
          url="https://github.com/trailofbits/winchecksec/releases/download/v3.1.0/windows.x64.Release.zip"
          want="487c14d941f94d8c1098f0da85144f1ecb40fc3e7f39dbaad16c8eab909fff25"
          curl -fSL -o wcs.zip "$url"
          got="$(sha256sum wcs.zip | awk '{print $1}')"
          [ "$got" = "$want" ] || { echo "::error::winchecksec sha256 mismatch: $got"; exit 1; }
          7z x -y wcs.zip -owcs >/dev/null
      - name: Assert binary mitigations (CFG + ASLR + High-Entropy VA + DEP)
        shell: bash
        run: |
          set -euo pipefail
          exe="target/release/scr1b3.exe"
          wcs="$(find wcs -name 'winchecksec.exe' | head -1)"
          [ -n "$wcs" ] || { echo "::error::winchecksec.exe not found"; exit 1; }
          "$wcs" -j "$exe" > report.json 2>wcs.err || { cat wcs.err; exit 1; }
          cat report.json
          python - <<'PY'
          import json
          data = json.load(open("report.json"))
          mit = data[0]["mitigations"]
          required = {
              "cfg": "Control Flow Guard (/guard:cf)",
              "dynamicBase": "ASLR (/DYNAMICBASE)",
              "highEntropyVA": "High-Entropy VA",
              "nx": "DEP (/NXCOMPAT)",
          }
          missing = [d for k, d in required.items() if mit.get(k, {}).get("presence") != "Present"]
          if missing:
              raise SystemExit("::error::shipped binary is missing mitigations: " + "; ".join(missing))
          print("binary hardening OK:", "; ".join(required.values()))
          PY
