name: CI

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  # Cancel only stale PR runs; never cancel master/scheduled runs, so they
  # complete and never leave a cancelled (failed-looking) check-run on the
  # commit (a cancelled SARIF/security scan is also an incomplete analysis).
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Least-privilege default for every job: read-only repo access. None of the CI
# jobs (build/test, cargo-deny, content-safety, manifest audit) write to the
# repo, so the GITHUB_TOKEN never needs more than `contents: read`.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: build & test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt, clippy
      - name: Linux GUI deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libxcb-render0-dev libxcb-shape0-dev \
            libxcb-xfixes0-dev libxkbcommon-dev libssl-dev
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Format check
        run: cargo fmt --all --check
      - name: Clippy (deny warnings)
        # `--locked` forces clippy to resolve against the committed
        # Cargo.lock so a freshly-published upstream major (e.g.
        # chardetng 1.0 — a breaking-API rev that lands as a
        # Dependabot PR) cannot break CI before we explicitly bump.
        run: cargo clippy --locked --all-targets -- -D warnings
      - name: Build
        run: cargo build --locked --all-targets
      - name: Test
        # --test-threads=1 — the egui-context E2E tests share font/atlas
        # state across Driver instances within a process and race under
        # parallel execution (locally observable: 52/52 pass at low test
        # counts, 3+ fail when the test count crosses a saturation
        # threshold). Until the E2E suite gains per-test process isolation
        # or a serial_test adoption decision lands, serial execution is
        # the deterministic gate. CI runtime cost is bounded by the
        # slowest single test (~3s for the rope-buffer million-line test).
        run: cargo test --locked -- --test-threads=1

  deny:
    name: cargo-deny (licenses + advisories)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe # v2.0.20
        with:
          command: check

  content-safety:
    name: public-repo content-safety audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - name: Audit for internal references / secrets
        run: python3 scripts/content_safety_audit.py

  forge-wire-manifest:
    name: F0RG3-W1R3 install-manifest audit (Phase 22 T22.3)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - name: Audit forge-wire-manifest.toml
        run: python3 scripts/verify_forge_wire_manifest.py

  fuzz-build:
    # Compile-only check that the cargo-fuzz targets stay buildable (they need
    # nightly + libFuzzer, so they live outside the main workspace). No fuzzing
    # run here — just a guard against the harness rotting. The checked-in
    # `fuzz/` project is what the OpenSSF Scorecard Fuzzing probe detects.
    name: fuzz targets build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install nightly Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable action; nightly toolchain
        with:
          toolchain: nightly
      - name: Linux GUI deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libxcb-render0-dev libxcb-shape0-dev \
            libxcb-xfixes0-dev libxkbcommon-dev libssl-dev
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked
      - name: Build fuzz targets (compile-only)
        working-directory: fuzz
        run: cargo +nightly fuzz build

  unused-deps:
    # cargo-machete fails the build on an UNUSED dependency. An unused dep is
    # unaudited code sitting in the lockfile + attack surface for no benefit;
    # keeping the graph minimal is a supply-chain control. Verified clean at
    # the time this job landed.
    name: cargo-machete (unused deps)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: Install cargo-machete
        run: cargo install cargo-machete --locked
      - name: Check for unused dependencies
        run: cargo machete

  binary-hardening:
    # Non-regressing guard for the binary mitigations: build the RELEASE exe
    # (Control Flow Guard is applied via .cargo/config.toml's cfg(windows)
    # rustflags) and assert with winchecksec that the shipped binary actually
    # carries CFG + ASLR (/DYNAMICBASE) + High-Entropy VA + DEP (/NXCOMPAT). If a
    # future change ever drops a mitigation, this fails instead of silently
    # shipping a weaker binary.
    name: binary hardening (winchecksec)
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Build release binary (CFG via .cargo/config.toml)
        run: cargo build --release --locked --bin scr1b3
      - name: Download + verify winchecksec
        shell: bash
        run: |
          set -euo pipefail
          # SHA-256-pinned download — never run an unverified binary in CI.
          url="https://github.com/trailofbits/winchecksec/releases/download/v3.1.0/windows.x64.Release.zip"
          want="487c14d941f94d8c1098f0da85144f1ecb40fc3e7f39dbaad16c8eab909fff25"
          curl -fSL -o wcs.zip "$url"
          got="$(sha256sum wcs.zip | awk '{print $1}')"
          [ "$got" = "$want" ] || { echo "::error::winchecksec sha256 mismatch: $got"; exit 1; }
          7z x -y wcs.zip -owcs >/dev/null
      - name: Assert binary mitigations (CFG + ASLR + High-Entropy VA + DEP)
        shell: bash
        run: |
          set -euo pipefail
          exe="target/release/scr1b3.exe"
          wcs="$(find wcs -name 'winchecksec.exe' | head -1)"
          [ -n "$wcs" ] || { echo "::error::winchecksec.exe not found"; exit 1; }
          "$wcs" -j "$exe" > report.json 2>wcs.err || { cat wcs.err; exit 1; }
          cat report.json
          python - <<'PY'
          import json
          data = json.load(open("report.json"))
          mit = data[0]["mitigations"]
          required = {
              "cfg": "Control Flow Guard (/guard:cf)",
              "dynamicBase": "ASLR (/DYNAMICBASE)",
              "highEntropyVA": "High-Entropy VA",
              "nx": "DEP (/NXCOMPAT)",
          }
          missing = [d for k, d in required.items() if mit.get(k, {}).get("presence") != "Present"]
          if missing:
              raise SystemExit("::error::shipped binary is missing mitigations: " + "; ".join(missing))
          print("binary hardening OK:", "; ".join(required.values()))
          PY
