name: Release

# Tag-gated cross-OS release: builds signed, checksummed artifacts and attaches
# them to a GitHub Release. Signing keys are provided as repo secrets and are
# NEVER committed (see packaging/signing.md). The in-app updater verifies the
# minisign signature against the embedded public key before swapping.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

# Least-privilege default. Only the `release` job (which creates the GitHub
# Release) is granted `contents: write`; the build matrix is read-only.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build ${{ matrix.target }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: macos-latest
            target: aarch64-apple-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          # Pinned for reproducible release builds; bump with rust-toolchain.toml.
          toolchain: "1.95.0"
          targets: ${{ matrix.target }}
      - name: Linux GUI deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libxkbcommon-dev libssl-dev
      # Embed the REAL release public key (a PUBLIC value, safe in a repo var)
      # so the shipped binary's in-app updater can verify signed releases.
      # Without the var set, the fail-closed placeholder in verify.rs stays and
      # auto-update verification rejects every artifact (never accepts an
      # unsigned/forged update) — see packaging/signing.md.
      - name: Embed release public key (when provisioned)
        if: vars.SCR1B3_MINISIGN_PUBLIC_KEY != ''
        shell: bash
        env:
          PUBKEY: ${{ vars.SCR1B3_MINISIGN_PUBLIC_KEY }}
        run: |
          set -euo pipefail
          python - "$PUBKEY" <<'PY'
          import re, sys, pathlib
          # The pubkey box form is two lines; keep the newline as a Rust \n escape.
          pk = sys.argv[1].replace("\r\n", "\n").replace("\n", "\\n").replace('"', '\\"')
          p = pathlib.Path("crates/scribe-core/src/update/verify.rs")
          s = p.read_text(encoding="utf-8")
          pat = re.compile(r'pub const EMBEDDED_PUBLIC_KEY: &str = "[^"]*";')
          new = pat.sub(lambda _m: f'pub const EMBEDDED_PUBLIC_KEY: &str = "{pk}";', s, count=1)
          assert new != s and "RWQ0000" not in new, "pubkey placeholder was not replaced"
          p.write_text(new, encoding="utf-8")
          print("embedded release public key")
          PY
      # No dependency cache in the release build: a poisoned cache could taint
      # published, signed artifacts (zizmor cache-poisoning). Release builds are
      # clean + reproducible by design.
      - name: Install cargo-auditable
        run: cargo install cargo-auditable --locked
      - name: Build release (cargo-auditable + hardened RUSTFLAGS)
        shell: bash
        env:
          MATRIX_OS: ${{ runner.os }}
        run: |
          set -euo pipefail
          # `cargo auditable build` embeds a scannable SBOM (the exact dependency
          # list + versions) into a section of the shipped binary, so the EXACT
          # artifact users run can be vuln-scanned offline with `cargo audit bin`,
          # trivy, grype, or osv-scanner — closing the gap that the release-time
          # CycloneDX SBOM is a detached file.
          #
          # An env RUSTFLAGS REPLACES `.cargo/config.toml`'s rustflags wholesale,
          # so we re-state Control Flow Guard here (Windows) and additionally strip
          # the build-machine absolute paths (workspace + cargo home) from the
          # binary via `--remap-path-prefix` (cleaner, more deterministic output;
          # the residual paths are the public CI runner's, not a user's).
          flags="--remap-path-prefix=${GITHUB_WORKSPACE}=/scr1b3 --remap-path-prefix=${CARGO_HOME:-$HOME/.cargo}=/cargo"
          if [ "$MATRIX_OS" = "Windows" ]; then
            flags="-C control-flow-guard $flags"
          fi
          export RUSTFLAGS="$flags"
          cargo auditable build --release --locked --target ${{ matrix.target }}
      - name: Generate third-party license inventory (cargo-about)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          # cargo-about generates a single HTML page with the license text of
          # every transitive Cargo dependency, satisfying the Apache-2.0
          # NOTICE-file convention and the OFL/UFL §3 redistribution clause for
          # the bundled fonts. Generated only on Linux because output is
          # platform-independent (avoids 3× redundant runs).
          cargo install cargo-about --locked --version "^0.6" || true
          cargo about init --no-handlebars 2>/dev/null || true
          cargo about generate about.hbs --output-file THIRD-PARTY-LICENSES-RUST.html 2>/dev/null \
            || cargo about generate --format json --output-file THIRD-PARTY-LICENSES-RUST.json \
            || echo "cargo-about generate skipped (config not yet committed)"
      - name: Upload third-party license inventory
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: third-party-licenses-rust
          path: |
            THIRD-PARTY-LICENSES-RUST.html
            THIRD-PARTY-LICENSES-RUST.json
          if-no-files-found: warn
      - name: Package + checksum
        shell: bash
        run: |
          mkdir -p dist
          bin="scr1b3"
          [ "${{ runner.os }}" = "Windows" ] && bin="scr1b3.exe"
          cp "target/${{ matrix.target }}/release/$bin" "dist/" 2>/dev/null || true
          cd dist
          tar -czf "scr1b3-${{ matrix.target }}.tar.gz" "$bin" 2>/dev/null || true
          # Drop the raw binary now that it's archived: it is NOT a release asset
          # and, being named just `scr1b3`/`scr1b3.exe`, the linux + macOS copies
          # would collide as same-named assets and fail the upload. Only the
          # target-prefixed `scr1b3-<target>.{tar.gz,sha256}` ship from this job;
          # the Windows installer .exe is built by the `windows-installer` job.
          rm -f "$bin"
          # The checksum sidecar MUST be named `<asset>.sha256` —
          # `scr1b3-<target>.tar.gz.sha256` — to match the in-app updater
          # (`build_release_info` looks for `{asset}.sha256`) and the signature
          # convention (`<asset>.tar.gz.minisig`). The old `scr1b3-<target>.sha256`
          # name (without the `.tar.gz` infix) is why every auto-update wrongly
          # reported "no build for your platform": the updater found the tarball +
          # its `.minisig` but never the mis-named sha, so `find()` returned None.
          tgz="scr1b3-${{ matrix.target }}.tar.gz"
          if command -v sha256sum >/dev/null; then sha256sum "$tgz" > "$tgz.sha256" 2>/dev/null || true; fi
      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: scr1b3-${{ matrix.target }}
          # Artifacts are built into `dist/` at the repo root (this is the
          # standalone public repo — NOT the monorepo `apps/scribe/` subtree).
          path: dist/*
          if-no-files-found: error

  windows-installer:
    # Builds the native Itasha.Corp CRT installer (.exe) — the same branded
    # FORGE-WIRE installer C0PL4ND ships, NOT a stock NSIS/MSI. The framework
    # (F0RG3-W1R3) owns the installer crate + branding; this job feeds it the
    # compiled scr1b3.exe + assets and the per-app config (apps/scribe.toml,
    # incl. the [itasha.brand] voice/kanji/tagline). Output:
    # scr1b3-<tag>-x86_64-setup.exe.
    name: Windows installer (native CRT)
    needs: build
    runs-on: windows-latest
    env:
      PYTHONUTF8: "1"
    permissions:
      contents: read
    steps:
      - name: Checkout SCR1B3 (assets + licenses)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          path: app
          persist-credentials: false
      - name: Checkout installer framework (F0RG3-W1R3)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: 46b-ETYKiAL/Itasha.Corp_F0RG3-W1R3
          path: framework
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          # Pinned for reproducible release builds; bump with rust-toolchain.toml.
          toolchain: "1.95.0"
      - name: Download Windows binary artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: scr1b3-x86_64-pc-windows-msvc
          path: winbin
      - name: Assemble payload (binary + assets + licenses)
        shell: bash
        run: |
          set -euo pipefail
          tgz="$(find winbin -name '*.tar.gz' | head -1)"
          [ -n "$tgz" ] || { echo "::error::no windows tarball under winbin/"; exit 1; }
          mkdir -p payload
          tar -xzf "$tgz" -C payload
          [ -f payload/scr1b3.exe ] || { echo "::error::scr1b3.exe not found in tarball"; exit 1; }
          if [ -d app/assets ]; then cp -r app/assets payload/assets; fi
          for f in LICENSE-MIT LICENSE-APACHE README.md; do
            [ -f "app/$f" ] && cp "app/$f" payload/ || true
          done
          find payload -maxdepth 2 | head -40
      - name: Build native installer (.exe)
        shell: bash
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          mkdir -p dist
          python framework/scripts/build_native_installer.py \
            --app scribe \
            --binary-dir payload \
            --version "$TAG" \
            --out "dist/scr1b3-${TAG}-x86_64-setup.exe"
          ls -la dist
      - name: Checksum installer
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          for e in *.exe; do sha256sum "$e" > "$e.sha256"; done
          cat *.sha256
      - name: Upload installer artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: scr1b3-windows-installer
          path: dist/*
          if-no-files-found: error

  release:
    needs: [build, windows-installer]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      # Only this job writes to the repo (creates the Release + uploads assets).
      contents: write
      # SLSA build-provenance attestation via GitHub's OIDC + Sigstore: `id-token`
      # mints the OIDC token, `attestations` writes the signed provenance. This is
      # ADDITIVE to the minisign signatures — minisign attests AUTHOR identity
      # (the embedded key), provenance attests BUILD integrity (which workflow/
      # commit/runner produced each artifact), verifiable with `gh attestation
      # verify <file> --repo <repo>`.
      id-token: write
      attestations: write
    steps:
      # Checkout the SOURCE (into an isolated `src/` path that never clobbers
      # `dist/`) so the post-sign self-verify gate can reconstruct SCR1B3's OWN
      # embedded minisign public key from `verify.rs` and verify every signed
      # asset against exactly what the shipped binary's updater will accept.
      - name: Checkout source (for embedded-key self-verify)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          path: src
          persist-credentials: false
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
      # Generate the Tier-1 signed-manifest payload (latest.json) BEFORE the
      # signing step, so the existing sign loop produces `latest.json.minisig`
      # and the fail-closed self-verify gate checks it like any other asset. The
      # manifest declares, per platform, {asset_name, sha256, size, url} plus
      # {version, release_index, minimum_version, valid_until_utc}; the in-app
      # updater (Tier-1 clients) verifies THIS manifest against the embedded key
      # and then pins each download's SHA-256 to the SIGNED digest here — making
      # artifact identity a SIGNED HASH, not an unsigned GitHub JSON field or a
      # tool-dependent trusted-comment string. `valid_until_utc` is the freeze
      # beacon; `minimum_version` is the signed anti-downgrade floor;
      # `release_index` is the monotonic anti-rollback ordinal. No extra checkout
      # is needed — the manifest is derived purely from the staged `dist/` assets
      # + the tag. `download-artifact` lands each asset in a per-target subdir
      # (`dist/scr1b3-<target>/<file>`), so the walk is RECURSIVE; the published
      # release flattens to bare names, so each asset_name + its download URL use
      # the basename.
      - name: Generate update manifest (latest.json, Tier 1)
        shell: bash
        env:
          REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          python3 - "$REPO" "$TAG" <<'PY'
          import sys, os, json, hashlib, datetime
          repo, tag = sys.argv[1], sys.argv[2]
          ver = tag[1:] if tag.startswith("v") else tag
          dist = "dist"
          TRIPLES = (
              "x86_64-pc-windows-msvc", "aarch64-pc-windows-msvc",
              "x86_64-unknown-linux-gnu", "aarch64-unknown-linux-gnu",
              "x86_64-apple-darwin", "aarch64-apple-darwin",
          )
          def platform_of(name):
              for t in TRIPLES:
                  if t in name:
                      return t
              # The native CRT installer (scr1b3-<tag>-x86_64-setup.exe) carries no
              # full triple in its name but is a Windows x64 asset.
              if name.endswith(".exe"):
                  return "x86_64-pc-windows-msvc"
              return None
          def kind_of(name):
              if name.endswith(".zip"): return "zip"
              if name.endswith(".tar.gz"): return "tar.gz"
              if name.endswith(".exe"): return "exe"
              return "other"
          # Walk RECURSIVELY: download-artifact nests each asset under
          # dist/<artifact-name>/<file>. Dedup by basename (an asset_name is a
          # stable identity across the per-target subdirs).
          seen = {}
          for root, _dirs, files in os.walk(dist):
              for fn in files:
                  if not fn.endswith((".zip", ".tar.gz", ".exe")):
                      continue          # archives/installers only (skip sidecars/SBOMs/licenses)
                  plat = platform_of(fn)
                  if plat is None:
                      continue
                  p = os.path.join(root, fn)
                  if not os.path.isfile(p) or fn in seen:
                      continue
                  with open(p, "rb") as fh:
                      digest = hashlib.sha256(fh.read()).hexdigest()
                  seen[fn] = {
                      "platform": plat, "kind": kind_of(fn), "asset_name": fn,
                      "url": f"https://github.com/{repo}/releases/download/{tag}/{fn}",
                      "size": os.path.getsize(p), "sha256": digest,
                  }
          assets = sorted(seen.values(), key=lambda a: (a["platform"], a["asset_name"]))
          if not assets:
              print("::error::manifest generation found no archive/installer assets in dist/")
              sys.exit(1)
          core = ver.split("+")[0].split("-")[0].split(".")
          maj, minr, pat = (core + ["0", "0", "0"])[:3]
          release_index = int(maj) * 1_000_000 + int(minr) * 1_000 + int(pat)
          now = datetime.datetime.now(datetime.timezone.utc).replace(microsecond=0)
          fmt = "%Y-%m-%dT%H:%M:%SZ"
          manifest = {
              "schema": "itasha.update.manifest/v1",
              "product": "scr1b3",
              "version": ver,
              "release_index": release_index,
              "minimum_version": "0.4.0",
              "published_utc": now.strftime(fmt),
              "valid_until_utc": (now + datetime.timedelta(days=14)).strftime(fmt),
              "assets": assets,
          }
          # Write the manifest at the TOP of dist/ so the existing sign loop
          # (`find dist -type f`) signs it and the release upload publishes it as
          # the bare `latest.json` (+ `latest.json.minisig`) the updater fetches.
          with open(os.path.join(dist, "latest.json"), "w", encoding="utf-8") as out:
              json.dump(manifest, out, indent=2, sort_keys=True)
              out.write("\n")
          print(f"manifest: v{ver} release_index={release_index} assets={len(assets)} valid_until={manifest['valid_until_utc']}")
          PY
          echo "----- dist/latest.json -----"
          cat dist/latest.json
      # Attest the BUILT artifacts before signing the sidecars — provenance
      # covers the build outputs themselves. Tier 2: this includes the Tier 1
      # signed manifest (dist/latest.json), not just the archives + installer,
      # so a verifier can prove every published asset (incl. the manifest that
      # binds them) was built by THIS workflow at THIS tag.
      - name: Attest build provenance (SLSA)
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: "dist/**/*.tar.gz, dist/**/*.exe, dist/latest.json"
      # Sign every release asset with minisign (via rsign2 — the same tool the
      # key was generated with; its signatures verify against the embedded key
      # through the app's `minisign-verify` crate). The passwordless secret key
      # is a repo secret, NEVER committed. When it is absent the step is a no-op
      # (artifacts ship checksummed but unsigned) — the in-script guard avoids
      # the secrets-in-`if` evaluation gotcha and fails safe.
      - name: Sign release artifacts + fail-closed self-verify gate (rsign2, when key provisioned)
        env:
          MINISIGN_SECRET_KEY: ${{ secrets.MINISIGN_SECRET_KEY }}
          # The PUBLIC release key (a repo var) — the exact value the build job
          # embeds into the binary. Preferred over the committed source constant
          # so the gate verifies against what the shipped updater actually trusts.
          PUBKEY_VAR: ${{ vars.SCR1B3_MINISIGN_PUBLIC_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${MINISIGN_SECRET_KEY:-}" ]; then
            echo "::warning::MINISIGN_SECRET_KEY not set — shipping checksummed but UNSIGNED artifacts (auto-update will reject them). See packaging/signing.md."
            exit 0
          fi
          cargo install rsign2 --locked --version "^0.6"
          umask 077
          # `cd` into each artifact's dir changes $PWD, so the key MUST be passed
          # by ABSOLUTE path.
          keypath="$PWD/sk.key"
          printf '%s\n' "$MINISIGN_SECRET_KEY" > "$keypath"
          # Sign the BARE filename from INSIDE each artifact's directory. minisign
          # records the EXACT arg passed to `sign` into the signature's trusted
          # comment as `file:<arg>`. Signing `dist/<target>/<asset>` would bake a
          # build-machine PATH into the comment (a latent footgun the moment any
          # verifier adds filename binding — the C0PL4ND auto-update outage);
          # signing the basename records `file:<asset>` (a stable identity).
          # `find` recurses the per-target subdirs `download-artifact` creates.
          count=0
          while IFS= read -r f; do
            base=$(basename "$f")
            ( cd "$(dirname "$f")" && rsign sign -W -s "$keypath" -x "${base}.minisig" "$base" )
            count=$((count + 1))
          done < <(find dist -type f ! -name '*.minisig')
          shred -u "$keypath" 2>/dev/null || rm -f "$keypath"
          echo "signed $count release artifact(s)"

          # --- Fail-closed self-verify gate -----------------------------------
          # Reconstruct SCR1B3's OWN embedded public key and verify EVERY signed
          # asset against it BEFORE publishing — the release can ship only what
          # the shipped binary's updater will accept. Prefer the provisioned repo
          # var; fall back to the committed `verify.rs` constant. Every check is a
          # HARD BLOCK (fail-closed) — a verify/identity/digest/parity/tamper
          # failure aborts the release.
          pub="${PUBKEY_VAR:-}"
          if [ -z "$pub" ]; then
            pub=$(grep -oE 'RW[A-Za-z0-9+/=]{40,}' src/crates/scribe-core/src/update/verify.rs | head -1)
          fi
          [ -n "$pub" ] || { echo "::error::no embedded pubkey found — cannot self-verify"; exit 1; }
          printf 'untrusted comment: scr1b3 minisign public key\n%s\n' "$pub" > rsign.pub
          assets=0; verified=0
          while IFS= read -r f; do
            base=$(basename "$f"); d=$(dirname "$f")
            assets=$((assets + 1))
            sig="$d/${base}.minisig"
            [ -f "$sig" ] || { echo "::error::missing signature for $base"; exit 1; }                                          # (A) coverage
            rsign verify -p rsign.pub -x "$sig" "$f" >/dev/null 2>&1 || { echo "::error::$base fails verify vs embedded key"; exit 1; }  # (C) crypto
            ft=$(grep -m1 '^trusted comment:' "$sig" | grep -oE 'file:[^[:space:]]+' | head -1 | sed 's/^file://')              # (D) identity
            case "$ft" in */*|*\\*) echo "::error::$sig comment carries a PATH ($ft)"; exit 1 ;; esac
            { [ -n "$ft" ] && [ "$ft" != "$base" ]; } && { echo "::error::$sig file:'$ft' != '$base'"; exit 1; }
            if [ -f "$d/${base}.sha256" ]; then                                                                                # (F) digest
              want=$(awk '{print $1; exit}' "$d/${base}.sha256"); got=$(sha256sum "$f" | awk '{print $1}')
              [ "$(printf %s "$want" | tr A-Z a-z)" = "$(printf %s "$got" | tr A-Z a-z)" ] || { echo "::error::$base sha256 mismatch"; exit 1; }
            fi
            verified=$((verified + 1))
          done < <(find dist -type f ! -name '*.minisig')
          nminisig=$(find dist -name '*.minisig' | wc -l | tr -d ' ')                                                          # (B) parity
          [ "$verified" -eq "$nminisig" ] || { echo "::error::sig parity $verified != $nminisig"; exit 1; }
          orig=$(find dist -type f ! -name '*.minisig' | head -1)                                                              # (G) tamper
          if [ -n "$orig" ]; then
            tf=$(mktemp); cp "$orig" "$tf"; printf '\x00' >> "$tf"
            if rsign verify -p rsign.pub -x "$(dirname "$orig")/$(basename "$orig").minisig" "$tf" >/dev/null 2>&1; then
              echo "::error::tamper test passed — gate broken"; exit 1
            fi
            rm -f "$tf"
          fi
          rm -f rsign.pub
          echo "release gate GREEN: $assets verified vs embedded key (crypto+identity+digest+parity+tamper)."
      - name: Create GitHub Release
        # `gh release` ships on every GitHub-hosted runner, so no third-party
        # action is needed (zizmor superfluous-actions). The default GITHUB_TOKEN
        # (job-scoped `contents: write`) authorises the release create + upload.
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          # Collect every built artifact (flattened from the per-target dirs).
          mapfile -t assets < <(find dist -type f)
          if [ "${#assets[@]}" -eq 0 ]; then
            echo "::error::No artifacts found under dist/ — refusing to publish an empty release."
            exit 1
          fi
          # Idempotent: create the release if absent, else upload/clobber into it
          # (so a re-run after a partial failure recovers instead of erroring).
          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$tag" --repo "$GITHUB_REPOSITORY" --clobber "${assets[@]}"
          else
            gh release create "$tag" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$tag" \
              --generate-notes \
              "${assets[@]}"
          fi
          # Always finish PUBLISHED + marked latest. GitHub auto-demotes a
          # release to a draft when its tag is deleted, so a delete+re-push tag
          # (re-cut) would otherwise leave an invisible draft after the upload
          # path. This makes the release reliably public + installable.
          gh release edit "$tag" --repo "$GITHUB_REPOSITORY" --draft=false --latest
