# CycloneDX SBOM generation — Phase 21 T21.1.
#
# Builds a Software Bill of Materials (CycloneDX 1.6 JSON) on every tagged
# release so downstream consumers can audit the dependency tree without
# scraping the lockfile by hand. Attached to the GitHub Release as
# `scr1b3-sbom.cdx.json`. Used by the supply-chain assurance posture
# described in SECURITY.md.
#
# Triggers ONLY on tag pushes — the SBOM is a release artifact, not a
# per-PR check (cargo-deny is the per-PR supply-chain gate).

name: SBOM

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

# Least-privilege default; the SBOM job is granted write only to attach the
# artifact to the release.
permissions:
  contents: read

jobs:
  cyclonedx:
    name: cargo-cyclonedx
    runs-on: ubuntu-latest
    permissions:
      contents: write   # attach the SBOM to the release
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      # No dependency cache in this release-context workflow (zizmor
      # cache-poisoning): the SBOM must reflect a clean dependency resolution.
      - name: Install cargo-cyclonedx
        # Pin to the 0.5.x line for reproducible, drift-free SBOMs. This line
        # emits CycloneDX up to spec 1.5; 1.6 is not yet implemented by
        # cargo-cyclonedx (roadmap only), so requesting it fails the run.
        run: cargo install cargo-cyclonedx --version "^0.5.9" --locked
      - name: Generate SBOM
        run: |
          # --spec-version 1.5: the highest CycloneDX version cargo-cyclonedx
          # 0.5.x supports (1.6 is unimplemented upstream). Bump when the tool
          # gains 1.6 support.
          cargo cyclonedx \
            --format json \
            --spec-version 1.5 \
            --all \
            --output-pattern bom
          # cargo-cyclonedx emits per-crate bom.json files; the workspace
          # root one is the unified BOM. Copy + name it for the release.
          cp bom.json scr1b3-sbom.cdx.json
      - name: Upload SBOM as workflow artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: scr1b3-sbom
          path: scr1b3-sbom.cdx.json
          if-no-files-found: error
      - name: Attach SBOM to the GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        # `gh release upload` ships on the runner — no third-party action needed
        # (zizmor superfluous-actions). `--clobber` keeps re-runs idempotent.
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          # The Release workflow runs in parallel and creates the release only
          # after its multi-platform builds finish, which can be AFTER this job.
          # Wait (up to ~10 min) for the release to exist before attaching, so
          # the SBOM upload never races ahead of release creation.
          for i in $(seq 1 60); do
            if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
              break
            fi
            echo "release $tag not yet created (attempt $i/60) — waiting 10s..."
            sleep 10
          done
          if ! gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "::error::release $tag was not created within the timeout — cannot attach SBOM."
            exit 1
          fi
          gh release upload "$tag" scr1b3-sbom.cdx.json \
            --repo "$GITHUB_REPOSITORY" --clobber
