# CycloneDX SBOM generation — Phase 21 T21.1.
#
# Builds a Software Bill of Materials (CycloneDX 1.6 JSON) on every tagged
# release so downstream consumers can audit the dependency tree without
# scraping the lockfile by hand. Attached to the GitHub Release as
# `scr1b3-sbom.cdx.json`. Used by the supply-chain assurance posture
# described in SECURITY.md.
#
# Triggers ONLY on tag pushes — the SBOM is a release artifact, not a
# per-PR check (cargo-deny is the per-PR supply-chain gate).

name: SBOM

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

# Least-privilege default; the SBOM job is granted write only to attach the
# artifact to the release.
permissions:
  contents: read

jobs:
  cyclonedx:
    name: cargo-cyclonedx
    runs-on: ubuntu-latest
    permissions:
      contents: write   # attach the SBOM to the release
    steps:
      - name: Harden the runner (egress audit)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          # Pinned for reproducible CI; bump in lockstep with rust-toolchain.toml.
          toolchain: "1.95.0"
      # No dependency cache in this release-context workflow (zizmor
      # cache-poisoning): the SBOM must reflect a clean dependency resolution.
      - name: Install cargo-cyclonedx
        # Pin to the 0.5.x line for reproducible, drift-free SBOMs. This line
        # emits CycloneDX up to spec 1.5; 1.6 is not yet implemented by
        # cargo-cyclonedx (roadmap only), so requesting it fails the run.
        run: cargo install cargo-cyclonedx --version "^0.5.9" --locked
      - name: Generate SBOM
        run: |
          # --spec-version 1.5: the highest CycloneDX version cargo-cyclonedx
          # 0.5.x supports (1.6 is unimplemented upstream). Bump when the tool
          # gains 1.6 support.
          # cargo-cyclonedx 0.5.x has no --output-pattern; it writes one BOM next
          # to each member's Cargo.toml (named by --override-filename). The
          # scribe-app crate's BOM is the binary's full SBOM — it pulls in
          # scribe-core + scribe-render + every transitive dependency (283
          # components), so that is the SBOM we publish.
          cargo cyclonedx \
            --format json \
            --spec-version 1.5 \
            --all \
            --override-filename scr1b3-sbom
          test -f crates/scribe-app/scr1b3-sbom.json
          cp crates/scribe-app/scr1b3-sbom.json scr1b3-sbom.cdx.json
      - name: Upload SBOM as workflow artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: scr1b3-sbom
          path: scr1b3-sbom.cdx.json
          if-no-files-found: error
      - name: Attach SBOM to the GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        # `gh release upload` ships on the runner — no third-party action needed
        # (zizmor superfluous-actions). `--clobber` keeps re-runs idempotent.
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          # The Release workflow runs in parallel and creates the release only
          # after its multi-platform builds finish, which is AFTER this job. The
          # release.yml build (3 OS targets + cargo-auditable + minisign signing
          # + winchecksec + SLSA provenance) takes ~12 min, so a 10-min wait
          # raced ahead of release creation and hard-failed on every release
          # (e.g. v0.4.28/v0.4.29: release job completed ~30s after the old
          # timeout expired). Wait up to ~30 min — comfortably longer than the
          # release build — so the SBOM upload never races ahead of release
          # creation. The `gh release upload --clobber` below is idempotent.
          for i in $(seq 1 180); do
            if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
              break
            fi
            echo "release $tag not yet created (attempt $i/180) — waiting 10s..."
            sleep 10
          done
          if ! gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "::error::release $tag was not created within the timeout — cannot attach SBOM."
            exit 1
          fi
          gh release upload "$tag" scr1b3-sbom.cdx.json \
            --repo "$GITHUB_REPOSITORY" --clobber
