# Secret-scan gate — Phase 21 T21.1.
#
# Runs gitleaks over the working tree on every push and PR. Detects
# accidentally-committed API keys / minisign private-key material /
# tokens etc. before they land on master. Complements the content-safety
# audit (scripts/content_safety_audit.py) which checks for path leaks +
# internal references but not credential shapes.
#
# Operator note: GitHub-native secret scanning + push protection are also
# enabled at the repo settings layer for the public satellite — see the
# brand/CI policy. This workflow is the local-runnable mirror and the
# in-PR signal.

name: secret-scan

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: secret-scan-${{ github.ref }}
  # Cancel only stale PR runs; never cancel master/scheduled runs, so they
  # complete and never leave a cancelled (failed-looking) check-run on the
  # commit (a cancelled SARIF/security scan is also an incomplete analysis).
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (egress audit)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Full history so gitleaks can scan every commit, not just HEAD.
          fetch-depth: 0
          persist-credentials: false
      - name: Run gitleaks
        # SHA-pinned per H-002 + M-001 of the 2026-05-29 security audit
        # (tj-actions/changed-files Mar-2025 supply-chain lesson). Dependabot
        # keeps the SHA current via .github/dependabot.yml.
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          # GITHUB_TOKEN is required by gitleaks-action@v2 to read the
          # pull-request diff. Without it the action emits:
          # "🛑 GITHUB_TOKEN is now required to scan pull requests."
          # and exits non-zero on every PR (the announced breaking
          # change at gitleaks/gitleaks-action#usage-example). The
          # automatically-created PR token is enough — no PAT needed.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # The action exits non-zero on any finding; PRs / pushes
          # carrying a leak are blocked at the merge queue.
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: true
          GITLEAKS_ENABLE_SUMMARY: true
