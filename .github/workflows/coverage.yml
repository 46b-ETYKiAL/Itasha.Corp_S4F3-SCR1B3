name: Coverage

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: coverage-${{ github.ref }}
  # Cancel only stale PR runs; never cancel master/scheduled runs so they
  # complete and never leave a cancelled (failed-looking) check-run on the
  # commit. Mirrors the CI workflow's concurrency policy.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Least-privilege: this job only reads the repo and writes the coverage report
# to the job summary + an artifact. It never comments on PRs or pushes, so the
# GITHUB_TOKEN never needs more than `contents: read`.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Structurally-uncoverable-headless whole files, excluded from the coverage
  # denominator so the measured % reflects the TESTABLE surface (see
  # docs/adr/0007-coverage-exclusions-and-floor.md). Each is 0%-or-near-0%
  # coverable in CI by construction, NOT for lack of tests:
  #   - app/visual_qa.rs : GPU render-QA harness (#[ignore], needs a wgpu adapter)
  #   - app/effects.rs   : ctx-layer painters → GPU pixels, nothing to assert
  #   - main.rs          : eframe::run_native boot; owns the event loop, never returns
  #   - win32-chrome/lib.rs : live Win32 FFI (HWND/DWM); #[cfg(windows)] dead on Linux CI
  # The [/\\] separator classes make the regex match both the Linux (CI) and
  # Windows (local) path forms. Full-path-anchored so it can't swallow a new file.
  COVERAGE_IGNORE_REGEX: 'scribe-app[/\\]src[/\\]app[/\\](visual_qa|effects)\.rs$|scribe-app[/\\]src[/\\]main\.rs$|scribe-win32-chrome[/\\]src[/\\]lib\.rs$'

jobs:
  coverage:
    name: code coverage (report-only)
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (egress audit)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          # Pinned for reproducible CI; bump in lockstep with rust-toolchain.toml.
          toolchain: "1.95.0"
          # llvm-tools-preview ships the LLVM coverage instrumentation
          # (llvm-profdata / llvm-cov) that cargo-llvm-cov drives.
          components: llvm-tools-preview
      - name: Linux GUI deps
        # Same egui / x11 system libraries the build & test job needs; the
        # workspace links them, so coverage instrumentation links them too.
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libxcb-render0-dev libxcb-shape0-dev \
            libxcb-xfixes0-dev libxkbcommon-dev libssl-dev
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Install cargo-llvm-cov + nextest
        uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # v2.83.2
        with:
          tool: cargo-llvm-cov,nextest
      - name: Run instrumented test suite (no report yet)
        # nextest runs the same suite as `cargo test`. We pin
        # `--test-threads=1` for the same reason CI does: the egui-context
        # E2E tests share font/atlas state across Driver instances within a
        # process and race under parallel execution (cargo-llvm-cov forwards
        # unrecognised args straight to `cargo nextest run`, which accepts
        # `--test-threads`). `--no-report` runs the instrumented tests and
        # leaves the merged profdata in target/ so the report steps below can
        # render multiple formats from one instrumented run.
        run: |
          cargo llvm-cov nextest --no-report --workspace --locked \
            --test-threads=1
      - name: Generate lcov report
        # Render lcov from the cached profdata produced above (no second
        # instrumented run). The same exclusion regex is applied to every
        # `report` invocation so the lcov artifact, the summary, and the floor
        # gate all describe the identical (testable) surface.
        run: cargo llvm-cov report --lcov --output-path lcov.info --ignore-filename-regex "$COVERAGE_IGNORE_REGEX"
      - name: Coverage summary
        # `report --summary-only` prints the per-file / total percentages from
        # the same cached profdata. Informational — the gating happens in the
        # "Coverage floor" step below. Tee it into the job summary so the numbers
        # surface on the run page.
        run: |
          {
            echo '## Code coverage'
            echo ''
            echo '```'
            cargo llvm-cov report --summary-only --ignore-filename-regex "$COVERAGE_IGNORE_REGEX"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Coverage floor (ratchet)
        # After the WU-1..WU-7 initiative AND the #26-#39 testing program
        # (proptest/fuzz, integration/load/IPC, e2e/a11y/visual, security,
        # crash-safety/i18n, criterion, Miri, mutation, + scribe-app logic
        # coverage), the TESTABLE surface (structurally-uncoverable-headless
        # whole files excluded via COVERAGE_IGNORE_REGEX above) measures ~85.3%
        # lines. This floor gates at 85% lines — a safety margin under the
        # measured value that catches a real regression while tolerating normal
        # fluctuation. RAISE it further as the app/mod.rs decomposition lands;
        # never lower it to make a red build pass. The exclusion regex MUST match
        # the one used for the summary/lcov steps so the gated number is the
        # testable number. See docs/adr/0007-coverage-exclusions-and-floor.md.
        # Renders from the same cached profdata (no second run).
        run: cargo llvm-cov report --fail-under-lines 85 --ignore-filename-regex "$COVERAGE_IGNORE_REGEX"
      - name: Upload lcov report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-lcov
          path: lcov.info
          if-no-files-found: error
