name: Coverage

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: coverage-${{ github.ref }}
  # Cancel only stale PR runs; never cancel master/scheduled runs so they
  # complete and never leave a cancelled (failed-looking) check-run on the
  # commit. Mirrors the CI workflow's concurrency policy.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Least-privilege: this job only reads the repo and writes the coverage report
# to the job summary + an artifact. It never comments on PRs or pushes, so the
# GITHUB_TOKEN never needs more than `contents: read`.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  coverage:
    name: code coverage (report-only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          # llvm-tools-preview ships the LLVM coverage instrumentation
          # (llvm-profdata / llvm-cov) that cargo-llvm-cov drives.
          components: llvm-tools-preview
      - name: Linux GUI deps
        # Same egui / x11 system libraries the build & test job needs; the
        # workspace links them, so coverage instrumentation links them too.
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libxcb-render0-dev libxcb-shape0-dev \
            libxcb-xfixes0-dev libxkbcommon-dev libssl-dev
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Install cargo-llvm-cov + nextest
        uses: taiki-e/install-action@25435dc8dd3baed7417e0c96d3fe89013a5b2e09 # v2.81.3
        with:
          tool: cargo-llvm-cov,nextest
      - name: Run instrumented test suite (no report yet)
        # nextest runs the same suite as `cargo test`. We pin
        # `--test-threads=1` for the same reason CI does: the egui-context
        # E2E tests share font/atlas state across Driver instances within a
        # process and race under parallel execution (cargo-llvm-cov forwards
        # unrecognised args straight to `cargo nextest run`, which accepts
        # `--test-threads`). `--no-report` runs the instrumented tests and
        # leaves the merged profdata in target/ so the report steps below can
        # render multiple formats from one instrumented run.
        run: |
          cargo llvm-cov nextest --no-report --workspace --locked \
            --test-threads=1
      - name: Generate lcov report
        # Render lcov from the cached profdata produced above (no second
        # instrumented run).
        run: cargo llvm-cov report --lcov --output-path lcov.info
      - name: Coverage summary
        # `report --summary-only` prints the per-file / total percentages from
        # the same cached profdata. No `--fail-under-*` threshold is set — the
        # repo has no coverage baseline yet, so this job is informational only
        # and must never fail the build on a coverage number. Tee it into the
        # job summary so the numbers surface on the run page.
        run: |
          {
            echo '## Code coverage (report-only)'
            echo ''
            echo '```'
            cargo llvm-cov report --summary-only
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload lcov report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-lcov
          path: lcov.info
          if-no-files-found: error
