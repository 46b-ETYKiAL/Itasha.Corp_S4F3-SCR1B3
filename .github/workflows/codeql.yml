name: CodeQL

# Free GHAS code scanning for SCR1B3. Languages present in the repo that
# CodeQL supports: Python (`scripts/content_safety_audit.py`,
# `scripts/verify_forge_wire_manifest.py`) and GitHub Actions (the five
# workflow files under `.github/workflows/`). Rust is NOT a CodeQL-supported
# language on the free public-repo tier (`cpp` / `csharp` / `go` / `java` /
# `javascript` / `python` / `ruby` / `actions` only) — Rust is covered by
# `cargo clippy --deny warnings` + `cargo-deny` (advisories / bans / licenses
# / sources) in `ci.yml` and `cargo-deny.yml`.
#
# Ported from F0RG3-W1R3's codeql.yml per audit M-002. Scheduled on Tuesdays
# to spread runner usage across the week.

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: "23 14 * * 2"   # Tuesday 14:23 UTC
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: codeql-${{ github.ref }}
  # Cancel only stale PR runs; never cancel master/scheduled runs, so they
  # complete and never leave a cancelled (failed-looking) check-run on the
  # commit (a cancelled SARIF/security scan is also an incomplete analysis).
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      actions: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: python
            build-mode: none
          - language: actions
            build-mode: none
    steps:
      - name: Harden the runner (egress audit)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          queries: security-extended

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          category: "/language:${{ matrix.language }}"
