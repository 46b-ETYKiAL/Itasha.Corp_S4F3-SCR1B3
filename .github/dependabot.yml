# SCR1B3 Dependabot config — Phase 21 T21.1. Tracks security advisories on
# Cargo + GitHub Actions deps and opens weekly bump PRs the maintainer reviews
# before merge. No private/paid registries; OSS-only per the no-paid-services
# posture. Honors the no-vendor-SDK rule (we never depend on a vendor LLM SDK)
# and the dep-management policy (production deps pinned, lockfile committed,
# vulnerability check before any add).

version: 2

updates:
  # Rust crates (workspace + every crate manifest under apps/scribe/).
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    rebase-strategy: auto
    # Wait before adopting brand-new releases so a malicious or broken fresh
    # publish (supply-chain attack) is caught upstream before Dependabot opens
    # a bump PR; longer hold for majors. (zizmor dependabot-cooldown)
    cooldown:
      default-days: 7
      semver-major-days: 30
      semver-minor-days: 7
      semver-patch-days: 3
    labels:
      - "dependencies"
      - "rust"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    # Only PRs that close a security advisory go through automatically; the
    # rest are queued for the maintainer's weekly review per the security
    # hardening dossier (T21.2).
    allow:
      - dependency-type: "all"
    # The egui UI stack is version-LOCKSTEP: egui / eframe / egui_tiles /
    # egui_kittest / egui-phosphor must all move to the same egui minor TOGETHER.
    # egui_tiles 0.16 requires egui 0.35, but egui-phosphor (our hairline icon
    # font, DECISION-2026-005) has no egui-0.35 release yet — its latest 0.12
    # still requires egui ^0.34 — so the whole 0.35 bump is upstream-BLOCKED and
    # cannot resolve (`cargo` errors selecting egui ^0.34 for egui-phosphor).
    # Ignore the 0.35-line bumps until egui-phosphor ships for 0.35 and the
    # coordinated egui 0.35 migration is done as a deliberate, visually-QA'd
    # effort; patch/minor bumps within the 0.34 line still flow normally.
    ignore:
      - dependency-name: "egui"
        versions: [">=0.35"]
      - dependency-name: "eframe"
        versions: [">=0.35"]
      - dependency-name: "egui_tiles"
        versions: [">=0.16"]
      - dependency-name: "egui_kittest"
        versions: [">=0.35"]
      - dependency-name: "egui-phosphor"
        versions: [">=0.13"]

  # GitHub Actions used in apps/scribe/.github/workflows/.
  - package-ecosystem: github-actions
    directory: "/.github/workflows"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    cooldown:
      default-days: 7
      semver-major-days: 30
      semver-minor-days: 7
      semver-patch-days: 3
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
