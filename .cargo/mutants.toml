# cargo-mutants config for scr1b3.
#
# Applies to BOTH the per-PR `mutation-in-diff` gate and the scheduled
# `mutation` / `mutation-app` jobs. The excluded files have NO unit-testable
# logic — egui/eframe per-frame render loops, native rfd dialogs, OS-shell
# integration, and the app bootstrap. Excluding them stops the gates reporting
# vacuous survivors on code that CANNOT be exercised without a live GUI/OS
# (ADR-0007 §3) — the "rfd dialogs mask mutation verdicts" failure that commits
# 5d6af04 / 7569a9a fixed at the CLI level, now made durable and consistent
# across every mutation run.
#
# MIXED files (mod.rs, render_support.rs, text_ops_methods.rs, builtins.rs, …)
# are DELIBERATELY NOT glob-excluded here: they carry real logic that must stay
# mutation-gated. Their individual UI-render functions are excluded precisely
# via `#[cfg_attr(test, mutants::skip)]` on the function, each with an ADR-0007
# justification — never by a broad file/regex glob that could silently hide a
# logic gap (a green-that-isn't-green).

exclude_globs = [
  # egui/eframe per-frame render + modal painting (no testable logic)
  "crates/scribe-app/src/app/frame_tick.rs",
  "crates/scribe-app/src/app/frame_modals.rs",
  "crates/scribe-app/src/app/modals.rs",
  "crates/scribe-app/src/app/grid_render.rs",
  "crates/scribe-app/src/app/toolbar_render.rs",
  # rfd native file dialogs (unreachable offline)
  "crates/scribe-app/src/app/dialogs.rs",
  # app + OS bootstrap / shell integration side-effects
  "crates/scribe-app/src/main.rs",
  "crates/scribe-app/src/integration/mod.rs",
  "crates/scribe-app/src/integration/linux.rs",
  "crates/scribe-app/src/integration/windows.rs",
]

# Exclude the heavy scale/perf test modules from every mutation TEST RUN.
#
# cargo-mutants re-runs the whole test suite once per mutant. The non-ignored
# scale tests (s5 ~53s, s11 ~31s in qa_largefile_scale_tests; scenario3 ~32s in
# qa_find_scale_tests) drag the scribe-app baseline from ~33s to ~73s — a cost
# paid on EVERY mutant, and enough to blow a tight per-mutant timeout. These
# tests assert panic-freedom / no-OOB at size N; they do NOT assert fine-grained
# logic, so they kill ~no logic mutant a fast unit test doesn't already kill, and
# the scale-SENSITIVE logic (mmap threshold, chunking) lives in scribe-core,
# which has its own mutation coverage. Excluding them keeps the run tractable
# without dropping logic kill-power. (This is a TEST-selection filter, not a
# code-exclusion glob — the scale MODULES' own source can still be mutated; only
# their slow tests are skipped while OTHER tests hunt those mutants.)
additional_cargo_test_args = [
  "-E",
  "not (test(/qa_largefile_scale_tests/) | test(/qa_find_scale_tests/))",
]

# nextest is the test tool for every mutation run. Making it the config default
# (not just a per-invocation `--test-tool nextest` flag) keeps the `-E` filter
# above valid on ANY invocation — a plain `cargo test` would reject `-E` and fail
# the baseline. All CI jobs already pass `--test-tool nextest`; this removes the
# footgun for ad-hoc local runs.
test_tool = "nextest"

# Pardoned mutants (equivalent or untestable — never a floor-lowering shortcut):
#
# - `action_log::path -> Option<&'static PathBuf>` body mutants (`-> None`,
#   `-> Some(default)`): `path` is a process-global first-caller-wins `OnceLock`
#   cache over `resolve_log_path`. 8 production `record` call sites prime it and
#   app-level tests trigger them under a shared `cargo test` process, so its
#   cached value is fixed for the binary's lifetime and a body mutation cannot be
#   observed deterministically by a unit test. The RESOLUTION logic it caches is
#   fully covered by the `resolve_log_path` unit tests; only this untestable cache
#   wrapper is pardoned. See crates/scribe-app/src/action_log.rs.
#
# - `reporting::log_outcome -> ()` (the thin wrapper only): `log_outcome` forwards
#   to `log_outcome_with`, whose sole side effect is `action_log::record` — which
#   routes through that same process-global first-caller-wins `OnceLock` path
#   cache, so "did the wrapper call the real sink" is not deterministically
#   observable under a shared-process test runner. The GATE + payload logic is
#   split into `log_outcome_with` and fully covered (telemetry-enabled forwards,
#   telemetry-disabled suppresses) with a capturing sink. The `\(\)` bound matches
#   the wrapper's whole-body mutant ONLY, never `log_outcome_with` (the `_with`
#   breaks the ` with ` match). See crates/scribe-app/src/reporting.rs.
# - effects.rs CRT/VHS paint functions (6): each takes `ctx: &egui::Context` and
#   paints directly (`ctx.layer_painter(...).rect_filled/circle_filled/line_segment`);
#   their internal alpha/phase/drift/position arithmetic is observable ONLY through
#   GPU-painted pixels (ADR-0007 "egui-paint" — no return value, no assertable
#   state). Confirmed by a real 197-mutant run: ALL 14 MISSED land in exactly these
#   6 functions; the one pure helper `wired_mesh_node_count` is separately tested
#   (the run's 1 caught) and its token does NOT collide with `paint_wired_mesh`.
#   paint_tint_overlay is a deliberate no-op stub with NO surviving mutant, so it is
#   NOT pardoned here (only confirmed survivors are excluded).
exclude_re = [
  "replace path -> Option<&'static PathBuf>",
  'replace log_outcome with \(\)',
  "paint_crt_scanlines",
  "paint_flicker",
  "paint_vhs_tracking",
  "paint_wired_mesh",
  "paint_caret_trail",
  "paint_boot_glitch",
]
