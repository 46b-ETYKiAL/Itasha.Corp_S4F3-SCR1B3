# cargo-deny configuration for SCR1B3.
# Enforces OSI-approved licenses + advisory denial in CI.
[advisories]
version = 2
yanked = "deny"
ignore = [
    # RUSTSEC-2025-0141 — bincode 1.x unmaintained. Transitive via
    # syntect 5.x; we don't consume bincode directly. NOT a security
    # vulnerability — the bincode team explicitly marked 1.3.3 as a
    # complete version not needing further updates. Hold for syntect
    # to migrate; evaluate tree-sitter-only fallback at the 90-day
    # mark. Documented in docs/audits/deep-scan-2026-05-29.md.
    "RUSTSEC-2025-0141",
]

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "MPL-2.0",
    "CC0-1.0",
    # BSL-1.0 — Boost Software License (OSI-approved + FSF-Free).
    # Required by clipboard-win + error-code, transitive via the rfd
    # native file-dialog stack used for Save As.
    "BSL-1.0",
    # OFL-1.1 — SIL Open Font License. Required by
    # epaint_default_fonts (egui's bundled Hack monospace) and the
    # JetBrains Mono Regular we ship at
    # assets/fonts/JetBrainsMono/OFL.txt.
    "OFL-1.1",
    # Ubuntu-font-1.0 — Ubuntu Font Licence (permissive font
    # license; equivalent to OFL for practical purposes). Required
    # by epaint_default_fonts whose compound license is
    # `(MIT OR Apache-2.0) AND OFL-1.1 AND Ubuntu-font-1.0` (egui
    # bundles Ubuntu Light as one of the default fallback faces).
    "Ubuntu-font-1.0",
    # CDLA-Permissive-2.0 — Community Data License Agreement (permissive).
    # Required by webpki-roots (the Mozilla CA trust-anchor bundle) pulled in
    # transitively by ureq/rustls for the in-app updater's HTTPS version check.
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.9

[bans]
multiple-versions = "warn"
wildcards = "warn"
# Privacy + attack-surface enforcement — "telemetry-free by construction"
# (see SECURITY.md / PRIVACY.md). The ONLY sanctioned network path is the
# opt-out auto-update version check over `ureq` + `rustls` (a synchronous,
# runtime-free HTTPS client). These crates must never enter the dependency
# graph: a second HTTP client / async runtime would be a new egress + attack
# surface, and any analytics / crash-reporting crate would silently break the
# no-telemetry guarantee. All confirmed absent from the full tree (incl.
# dev-deps) when this list landed, so each entry is a forward guard.
deny = [
    # Alternative HTTP clients / async runtimes — `ureq` is the one stack.
    { name = "reqwest" },
    { name = "hyper" },
    { name = "isahc" },
    { name = "curl" },
    { name = "surf" },
    { name = "tokio" },
    # Telemetry / analytics / crash-reporting — forbidden outright.
    { name = "sentry" },
    { name = "sentry-core" },
    { name = "opentelemetry" },
    { name = "tracing-opentelemetry" },
    { name = "posthog-rs" },
    { name = "mixpanel" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
# The W1TN3SS reporting SDK (itasha-report-core) is a FIRST-PARTY git dependency
# pinned to an exact tag. It is the only allowed non-crates.io source — a public,
# auditable, `#![forbid(unsafe_code)]` Itasha.Corp crate. cargo-vet audits the
# pinned revision separately (supply-chain/audits.toml).
allow-git = ["https://github.com/46b-ETYKiAL/Itasha.Corp_S4F3-W1TN3SS"]
