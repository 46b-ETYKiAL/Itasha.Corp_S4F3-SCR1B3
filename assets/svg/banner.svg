<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="420" viewBox="0 0 1280 420">
  <defs>
    <pattern id="scanlines" patternUnits="userSpaceOnUse" width="1280" height="4">
      <rect width="1280" height="2" fill="transparent"/>
      <rect y="2" width="1280" height="2" fill="rgba(0,0,0,0.15)"/>
    </pattern>
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.4)"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="phosphor">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.8" result="bloom"/>
      <feMerge>
        <feMergeNode in="bloom"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <style>
    @keyframes curBlink { 0%,50% { opacity: 1; } 51%,100% { opacity: 0; } }
    @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
  </style>

  <!-- OUTER CRT CASE (bezel) -->
  <rect x="0" y="0" width="1280" height="420" rx="12" ry="12" fill="#1A242B"/>
  <rect x="2" y="2" width="1276" height="416" rx="11" ry="11" fill="#121A1F" stroke="#2a2833" stroke-width="1"/>

  <!-- Bezel detail lines -->
  <line x1="24" y1="14" x2="1256" y2="14" stroke="#2a2833" stroke-width="0.5"/>
  <line x1="24" y1="406" x2="1256" y2="406" stroke="#2a2833" stroke-width="0.5"/>

  <!-- INNER SCREEN -->
