<svg xmlns="http://www.w3.org/2000/svg" width="1680" height="720" viewBox="0 0 1680 720" role="img" aria-label="SCR1B3 — a GPU code/prose editor, the scribe of the wired">
  <defs>
    <pattern id="scanlines" patternUnits="userSpaceOnUse" width="1680" height="4">
      <rect width="1680" height="2" fill="transparent"/>
      <rect y="2" width="1680" height="2" fill="rgba(0,0,0,0.15)"/>
    </pattern>
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.4)"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="phosphor">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.8" result="bloom"/>
      <feMerge>
        <feMergeNode in="bloom"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="sc"><rect x="28" y="22" width="1624" height="672" rx="6"/></clipPath>
  </defs>
  <style>
    text { font-family: 'SF Mono','Fira Code','Cascadia Code','JetBrains Mono',Consolas,monospace; }
    @keyframes sweep { 0% { transform: translateY(0); } 100% { transform: translateY(672px); } }
    @keyframes flicker { 0%,96%,100% { opacity: 1; } 97% { opacity: 0.97; } 98% { opacity: 0.995; } }
    @keyframes bootReveal { 0% { opacity: 0; } 100% { opacity: 0.92; } }
    @keyframes curBlink { 0%,50% { opacity: 1; } 51%,100% { opacity: 0; } }
    @keyframes heartbeat { 0%,100% { r: 4; opacity: 0.55; } 15% { r: 5; opacity: 0.95; } 30% { r: 4; opacity: 0.55; } 50% { r: 4.4; opacity: 0.8; } }
    @keyframes edgeGlow { 0% { stroke-dashoffset: 4600; } 100% { stroke-dashoffset: 0; } }
    @keyframes phosphorBloom { 0%,100% { opacity: 0; } 50% { opacity: 0.02; } }
    @keyframes sealPulse { 0%,100% { opacity: 0.10; } 50% { opacity: 0.18; } }
    @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
  </style>

  <!-- OUTER CRT CASE (bezel) -->
  <rect x="0" y="0" width="1680" height="720" rx="14" ry="14" fill="#1A242B"/>
  <rect x="2" y="2" width="1676" height="716" rx="13" ry="13" fill="#121A1F" stroke="#2a2833" stroke-width="1"/>
  <line x1="24" y1="13" x2="1656" y2="13" stroke="#2a2833" stroke-width="0.5"/>
  <line x1="24" y1="700" x2="1656" y2="700" stroke="#2a2833" stroke-width="0.5"/>

  <!-- INNER SCREEN -->
  <rect x="28" y="22" width="1624" height="672" rx="6" ry="6" fill="#070A0C"/>

  <g clip-path="url(#sc)">
    <!-- caret-in-seal watermark (bespoke SCR1B3 daemon-seal, right side) -->
    <g transform="translate(1320, 380)" style="animation: sealPulse 6s ease-in-out infinite;">
      <circle cx="0" cy="0" r="150" stroke="#34E0D0" stroke-width="22" fill="none"/>
      <rect x="-20" y="-40" width="40" height="80" rx="4" ry="4" fill="#34E0D0"/>
      <line x1="-56" y1="64" x2="56" y2="64" stroke="#34E0D0" stroke-width="6" stroke-linecap="round"/>
    </g>
    <rect x="28" y="22" width="1624" height="672" rx="6" ry="6" fill="url(#scanlines)"/>
    <rect x="28" y="22" width="1624" height="672" rx="6" ry="6" fill="url(#vignette)"/>
    <rect x="28" y="22" width="1624" height="3" fill="#34E0D0" opacity="0.05" style="animation: sweep 9s linear infinite;"/>
    <rect x="28" y="22" width="1624" height="672" fill="#ffffff" opacity="0" style="animation: phosphorBloom 8s ease-in-out infinite;"/>
  </g>
  <rect x="28" y="22" width="1624" height="672" rx="6" ry="6" fill="none" stroke="#34E0D0" stroke-width="1" opacity="0.07" stroke-dasharray="22,4600" style="animation: edgeGlow 11s linear infinite;"/>
  <rect x="28" y="22" width="1624" height="672" rx="6" ry="6" fill="none" stroke="#0F1A20" stroke-width="1"/>

  <!-- Corner brackets -->
  <g stroke="#34E0D0" stroke-width="1.4" fill="none" opacity="0.5">
    <path d="M56 54 h26 M56 54 v26"/><path d="M1624 54 h-26 M1624 54 v26"/>
    <path d="M56 662 h26 M56 662 v-26"/><path d="M1624 662 h-26 M1624 662 v-26"/>
  </g>

  <!-- CRT TEXT CONTENT -->
  <g filter="url(#phosphor)" style="animation: flicker 7s infinite;">
    <text x="840" y="100" text-anchor="middle" font-size="14" fill="#5A6B73" letter-spacing="8">I T A S H A . C O R P</text>

    <text x="840" y="166" text-anchor="middle" font-size="34" fill="#34E0D0" letter-spacing="8" font-weight="bold" filter="url(#glow)">[ S 4 F 3 : SCR1B3 ]</text>
    <line x1="640" y1="186" x2="1040" y2="186" stroke="#34E0D0" stroke-width="0.5" opacity="0.4"/>
    <text x="840" y="216" text-anchor="middle" font-size="14" fill="#5A6B73" letter-spacing="4">the scribe of the wired · GPU-rendered · rope-buffered</text>

    <g font-size="14">
      <text x="200" y="290" fill="#5A6B73">scr1b3.init ─────────────────────────────────────</text>

      <text x="240" y="326" fill="#34E0D0" xml:space="preserve" style="animation: bootReveal 0.35s ease-out 0.2s both;">&gt; mounting rope buffer<tspan dx="16" fill="#34E0D0">[ OK ]</tspan></text>
      <text x="240" y="360" fill="#34E0D0" xml:space="preserve" style="animation: bootReveal 0.35s ease-out 0.5s both;">&gt; loading syntax (tree-sitter + syntect)<tspan dx="16" fill="#34E0D0">[ OK ]</tspan></text>
      <text x="240" y="394" fill="#34E0D0" xml:space="preserve" style="animation: bootReveal 0.35s ease-out 0.8s both;">&gt; telemetry<tspan dx="16" fill="#5A6B73">[ DISABLED ]</tspan></text>
      <text x="240" y="428" fill="#34E0D0" xml:space="preserve" style="animation: bootReveal 0.35s ease-out 1.1s both;">&gt; spellcheck<tspan dx="16" fill="#5A6B73">[ OFFLINE ]</tspan></text>
      <text x="240" y="462" fill="#34E0D0" xml:space="preserve" style="animation: bootReveal 0.35s ease-out 1.4s both;">&gt; plugins runtime (lua + wasm)<tspan dx="16" fill="#34E0D0">[ READY ]</tspan></text>

      <text x="200" y="498" fill="#5A6B73">──────────────────────────────────────────────────</text>

      <text x="200" y="536" fill="#5A6B73">present day, present text<tspan dx="16" fill="#34E0D0" font-weight="bold">[ 0NL1N3 ]</tspan></text>

      <text x="200" y="574" fill="#5A6B73">scribe@wired:~$<tspan dx="8" fill="#34E0D0" style="animation: curBlink 1.1s step-end infinite;">█</tspan></text>
    </g>
  </g>

  <!-- BEZEL DETAILS -->
  <g>
    <circle cx="56" cy="690" r="3.5" fill="#34E0D0" opacity="0.7" style="animation: heartbeat 2.4s ease-in-out infinite;"/>
    <circle cx="69" cy="690" r="3" fill="#34E0D0" opacity="0.45"/>
    <circle cx="82" cy="690" r="3" fill="#5A6B73" opacity="0.3"/>
    <text x="102" y="693" font-size="9" fill="#2a3a42" letter-spacing="2">ITASHA.CORP</text>
    <text x="1500" y="693" font-size="9" fill="#2a3a42">CRT-IC // SCR1B3</text>
    <circle cx="1624" cy="690" r="4" fill="#34E0D0" opacity="0.5"/>
    <circle cx="1624" cy="690" r="2" fill="#34E0D0" opacity="0.95" style="animation: heartbeat 2.4s ease-in-out infinite;"/>
  </g>
</svg>
