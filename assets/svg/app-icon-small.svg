<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" role="img" aria-label="SCR1B3">
  <!-- SCR1B3 app-icon SMALL tier (<=48px). Demon-sigil family, distilled to the
       legible survivors: void plate + single containment ring + 4 cardinal
       ticks + a FILLED pen-nib core (a stroked nib disappears at 16-32px).
       Same identity as the master, squint-test legible. Monochrome white. -->
  <rect x="0" y="0" width="64" height="64" rx="12" ry="12" fill="#070A0C"/>
  <g transform="translate(32,32)">
    <g fill="none" stroke="#FFFFFF" stroke-linecap="round" stroke-linejoin="round">
      <circle r="23" stroke-width="4.5"/>
      <g stroke-width="3">
        <line x1="0" y1="-23" x2="0" y2="-28"/>
        <line x1="23" y1="0" x2="28" y2="0"/>
        <line x1="0" y1="23" x2="0" y2="28"/>
        <line x1="-23" y1="0" x2="-28" y2="0"/>
      </g>
    </g>
    <!-- filled nib silhouette with a carved slit + vent -->
    <path d="M-10 -8 Q-10 -14 -4 -14 L4 -14 Q10 -14 10 -8 L10 0 Q10 9 0 18 Q-10 9 -10 0 Z"
          fill="#FFFFFF" stroke="none"/>
    <circle cx="0" cy="-5" r="2.6" fill="#070A0C"/>
    <line x1="0" y1="0" x2="0" y2="15" stroke="#070A0C" stroke-width="2.4" stroke-linecap="round"/>
  </g>
</svg>
