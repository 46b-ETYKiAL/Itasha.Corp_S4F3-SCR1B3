<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" role="img" aria-label="SCR1B3 logomark — daemon seal">
  <!-- SCR1B3 logomark — quiet daemon-seal monogram for in-app / title-bar use.
       Same family as app-icon (DECISION-2026-008) without CRT scanlines / vignette / ticks. -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#070A0C"/>
      <stop offset="1" stop-color="#121A1F"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="256" height="256" rx="40" ry="40" fill="url(#bg)"/>
  <rect x="6" y="6" width="244" height="244" rx="36" ry="36" fill="none" stroke="#1A242B" stroke-width="4"/>
  <g stroke="#34E0D0" fill="none" stroke-linecap="round">
    <circle cx="128" cy="128" r="76" stroke-width="14"/>
    <rect x="118" y="108" width="20" height="40" rx="2" ry="2" fill="#34E0D0" stroke="none"/>
    <line x1="100" y1="160" x2="156" y2="160" stroke-width="3"/>
  </g>
</svg>
