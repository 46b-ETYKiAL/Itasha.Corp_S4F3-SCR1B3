<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <pattern id="scanlines" patternUnits="userSpaceOnUse" width="1280" height="4">
      <rect width="1280" height="2" fill="transparent"/>
      <rect y="2" width="1280" height="2" fill="rgba(0,0,0,0.15)"/>
    </pattern>
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.45)"/>
    </radialGradient>
    <filter id="phosphor">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.8" result="bloom"/>
      <feMerge>
        <feMergeNode in="bloom"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- CRT bezel -->
  <rect x="0" y="0" width="1280" height="640" rx="14" ry="14" fill="#111118"/>
  <rect x="3" y="3" width="1274" height="634" rx="13" ry="13" fill="#18181f" stroke="#2a2833" stroke-width="1"/>
  <!-- Inner screen -->
  <rect x="32" y="28" width="1216" height="584" rx="8" ry="8" fill="#08060d"/>
  <rect x="32" y="28" width="1216" height="584" rx="8" ry="8" fill="none" stroke="#1a1825" stroke-width="1"/>

  <g filter="url(#phosphor)">
    <!-- Brand microtext -->
    <text x="640" y="118" text-anchor="middle" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', 'Cascadia Code', Consolas, monospace" font-size="18" fill="#5a5869" letter-spacing="12">
      I T A S H A . C O R P
    </text>
    <!-- SCR1B3 wordmark -->
    <text x="600" y="248" text-anchor="middle" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', 'Cascadia Code', Consolas, monospace" font-size="120" font-weight="bold" fill="#00fffe" letter-spacing="10">
      SCR1B3
    </text>
    <text x="1010" y="248" text-anchor="middle" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', 'Cascadia Code', Consolas, monospace" font-size="120" font-weight="bold" fill="#01fe36">&#9612;</text>
    <!-- Underline -->
    <line x1="320" y1="282" x2="960" y2="282" stroke="#00fffe" stroke-width="0.5" opacity="0.4"/>
    <!-- Tagline -->
    <text x="640" y="324" text-anchor="middle" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', 'Cascadia Code', Consolas, monospace" font-size="22" fill="#5a5869" letter-spacing="6">
      present day, present text
    </text>

    <!-- Feature bullets -->
    <text x="320" y="424" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', 'Cascadia Code', Consolas, monospace" font-size="22" fill="#00fffe">&gt; telemetry-free</text>
    <text x="780" y="424" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', 'Cascadia Code', Consolas, monospace" font-size="22" fill="#00fffe">&gt; cross-platform</text>
    <text x="320" y="470" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', 'Cascadia Code', Consolas, monospace" font-size="22" fill="#00fffe">&gt; large-file</text>
    <text x="780" y="470" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', 'Cascadia Code', Consolas, monospace" font-size="22" fill="#00fffe">&gt; themeable</text>

    <!-- Status line -->
    <text x="320" y="546" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', 'Cascadia Code', Consolas, monospace" font-size="18" fill="#5a5869">
      STATUS .................................................
    </text>
    <text x="900" y="546" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', 'Cascadia Code', Consolas, monospace" font-size="18" fill="#01fe36" font-weight="bold">
      [ 0NL1N3 ]
    </text>
  </g>

  <!-- Scanlines + vignette on screen -->
  <rect x="32" y="28" width="1216" height="584" rx="8" ry="8" fill="url(#scanlines)"/>
  <rect x="32" y="28" width="1216" height="584" rx="8" ry="8" fill="url(#vignette)"/>
  <!-- Power LED -->
  <circle cx="1228" cy="618" r="5" fill="#01fe36" opacity="0.8"/>
  <circle cx="1228" cy="618" r="2.5" fill="#01fe36"/>
  <!-- Bezel marks -->
  <text x="60" y="621" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', 'Cascadia Code', Consolas, monospace" font-size="11" fill="#2a2833" letter-spacing="2">ITASHA.CORP</text>
  <text x="1120" y="621" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', 'Cascadia Code', Consolas, monospace" font-size="11" fill="#2a2833">CRT-SCR1B3</text>
</svg>
